<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

.logout{font-size:.76rem;color:var(--t3);background:var(--bg3);border:1px solid var(--bd);padding:6px 14px;border-radius:20px}

/* ── 네비 ── */
.nav{

.tab{

}

/* ── 필터 ── */

.filter::-webkit-scrollbar{display:none}
.pill{

.fab{

.toast{

.empty{text-align:center;padding:64px 20px;color:var(--t3)}

.spin{

}

.overlay{display:none;position:fixed;inset:0;z-index:50;background:var(--bg);overflow-y:auto}

<body>

<!-- 메인 앱 -->
<div class="app" id="appView">
  <header class="hd">
    <div class="hd-l">
      <div class="logo-s">💰</div>
      <div class="hd-t">우리집 가계부</div>
    </div>
  </header>
  <nav class="nav" id="nav"></nav>
  <main id="main"><div class="spin"></div></main>
  <button class="fab" onclick="openSheet()">＋</button>
</div>

<div class="toast" id="toast"></div>

<!-- 입력 시트 -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="s-top">
      <div class="s-t" id="sheetTitle">내역 추가</div>
      <button class="s-x" onclick="closeSheet()">취소</button>
    </div>
    <div class="s-bd">
      <div class="frow">
        <label class="flb">구분</label>
        <div class="toggle">
          <button class="tg tg-e" id="tgExp" onclick="setType('지출')">지출</button>
          <button class="tg" id="tgInc" onclick="setType('입금')">입금</button>
        </div>
      </div>
      <div class="frow"><label class="flb">누가</label><div class="seg" id="memberSeg"></div></div>
      <div class="frow"><label class="flb">날짜</label><input class="inp" type="date" id="fDate"></div>
      <div class="frow"><label class="flb">금액</label><input class="inp" id="fAmount" inputmode="numeric" placeholder="0"></div>
      <div class="frow"><label class="flb">카테고리</label><input class="inp" id="fCategory" list="catList" placeholder="식비, 생활비 등"><datalist id="catList"></datalist></div>
      <div class="frow"><label class="flb">결제수단</label><input class="inp" id="fMethod" list="methodList" placeholder="신한카드 등"><datalist id="methodList"></datalist></div>
      <div class="frow"><label class="flb">계좌</label><input class="inp" id="fAccount" list="accountList" placeholder="우리은행 등"><datalist id="accountList"></datalist></div>
      <div class="frow"><label class="flb">세부내역</label><input class="inp" id="fMemo" placeholder="메모 (선택)"></div>
      <button class="submit" id="saveBtn" onclick="saveEntry()">저장하기</button>
    </div>
  </div>
</div>

<script>
/* ── 상태 ── */
let sb, ROWS = [], LIMITS = {}, tab = "list", scope = "current", memberFilter = "전체", typeVal = "지출", memberVal = MEMBERS[0], editId = null, loadError = null;
const won = n => Number(n||0).toLocaleString("ko-KR")+"원";
const wonShort = n => n>=10000 ? (n/10000).toFixed(n%10000?1:0)+"만" : Number(n).toLocaleString("ko-KR");
const CAT_ICON = {생활비:"🛒",고정비:"🏠",월급:"💵",이자:"📈",데이트:"❤️",식비:"🍽️",교통:"🚌",의료:"💊",쇼핑:"👜",문화:"🎬",교육:"📚",통신:"📱",보험:"🛡️",기타:"📌"};
const icon = c => CAT_ICON[c] || "💳";
const toast = m => { const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1800); };

/* ── 결제 주기 ── */
function billingPeriod(ref){ ref=ref||new Date(); const d=ref.getDate(),m=ref.getMonth(),y=ref.getFullYear(); let sy,sm,ey,em;
  if(d>=25){sy=y;sm=m;ey=m===11?y+1:y;em=m===11?0:m+1;}else{sy=m===0?y-1:y;sm=m===0?11:m-1;ey=y;em=m;}
  return {start:new Date(sy,sm,25),end:new Date(ey,em,24,23,59,59),label:`${sm+1}/25 ~ ${em+1}/24`,key:`${sy}-${String(sm+1).padStart(2,"0")}`}; }
function recentPeriods(n){ const cur=billingPeriod(); return Array.from({length:n},(_,i)=>billingPeriod(new Date(cur.start.getFullYear(),cur.start.getMonth()-(n-1-i),25))); }
const inPeriod = (s,p)=>{ const d=new Date(s.length===10?s+"T12:00:00":s); return d>=p.start&&d<=p.end; };

/* ── 초기화 ── */
window.onload = async () => {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  buildNav(); renderMemberSeg();
  try {
    await loadAll();
  } catch(e) {
    loadError = e.message;
    console.error("초기화 오류:", e);
  }
  render();
};

/* ── 데이터 로드/저장 ── */
async function loadAll(){
  loadError = null;
  const [tx, lim] = await Promise.all([
    sb.from("transactions").select("*").order("date",{ascending:false}),
    sb.from("category_limits").select("*")
  ]);
  if(tx.error){
    console.error("거래내역 로드 오류:", tx.error);
    throw new Error(tx.error.message || "거래내역을 불러오지 못했습니다");
  }
  ROWS = tx.data || [];
  LIMITS = {};
  if(lim.error){
    console.error("한도 로드 오류:", lim.error);
  } else {
    (lim.data||[]).forEach(l => LIMITS[l.category] = Number(l.monthly_limit));
  }
}
async function saveEntry(){
  const amount = Number(document.getElementById("fAmount").value.replace(/,/g,""));
  const row = {
    date: document.getElementById("fDate").value, amount, type: typeVal, member: memberVal,
    category: document.getElementById("fCategory").value.trim(),
    method: document.getElementById("fMethod").value.trim(),
    account: document.getElementById("fAccount").value.trim(),
    memo: document.getElementById("fMemo").value.trim()
  };
  if(!row.amount || !row.category || !row.account){ toast("금액·카테고리·계좌는 필수예요"); return; }
  const btn = document.getElementById("saveBtn");
  btn.textContent = "저장 중..."; btn.disabled = true;
  try {
    const res = editId ? await sb.from("transactions").update(row).eq("id",editId)
                       : await sb.from("transactions").insert(row);
    if(res.error){
      console.error("저장 오류:", res.error);
      toast("저장 오류: " + res.error.message);
      return;
    }
    closeSheet();
    await loadAll();
    render();
    toast(editId ? "수정 완료" : "저장 완료");
  } catch(e) {
    console.error("저장 예외:", e);
    toast("오류: " + e.message);
  } finally {
    btn.textContent = editId ? "수정하기" : "저장하기";
    btn.disabled = false;
  }
}
async function delEntry(id){
  if(!confirm("삭제하시겠습니까?")) return;
  const res = await sb.from("transactions").delete().eq("id",id);
  if(res.error){ toast("삭제 오류: " + res.error.message); return; }
  await loadAll(); render(); toast("삭제 완료");
}
async function saveLimit(cat){
  const v = Number(document.getElementById("lim_"+cat).value.replace(/,/g,""));
  const res = await sb.from("category_limits").upsert({category:cat, monthly_limit:v},{onConflict:"category"});
  if(res.error){ toast("한도 저장 오류: " + res.error.message); return; }
  await loadAll(); render(); toast("한도 저장");
}

/* ── 네비/필터 ── */
const TABS = [["list","📋","내역"],["cat","📊","분류"],["limit","🎯","한도"],["analysis","📈","분석"],["acct","🏦","계좌"],["master","⚙️","설정"]];
function buildNav(){ document.getElementById("nav").innerHTML = TABS.map(([k,ic,lb])=>
  `<button class="tab${k===tab?' on':''}" onclick="goTab('${k}')"><span class="tab-ic">${ic}</span>${lb}</button>`).join(""); }
function goTab(k){ tab=k; buildNav(); render(); }
function setScope(s){ scope=s; render(); }
function setMemberFilter(m){ memberFilter=m; render(); }
function myRows(){ return memberFilter==="전체" ? ROWS : ROWS.filter(r=>r.member===memberFilter); }
function scoped(){ const cur=billingPeriod(); return scope==="current" ? myRows().filter(r=>inPeriod(r.date,cur)) : myRows(); }

/* ── 렌더 ── */
function render(){
  const m = document.getElementById("main");
  if(loadError){
    m.innerHTML = `<div class="sec"><div style="background:rgba(255,107,138,.08);border:1px solid rgba(255,107,138,.35);border-radius:16px;padding:20px 18px;margin-top:16px">
      <div style="font-size:1.1rem;font-weight:900;color:var(--r);margin-bottom:8px">⚠️ 데이터 연결 오류</div>
      <div style="font-size:.83rem;color:var(--t2);margin-bottom:14px;line-height:1.7">${loadError}</div>
      <div style="font-size:.78rem;color:var(--t3);line-height:1.8">
        <b style="color:var(--t2)">해결 방법 (Supabase 대시보드)</b><br>
        1. Table Editor → transactions → RLS Policies<br>
        2. "New Policy" → "For full customization"<br>
        3. Policy: <code style="background:var(--bg3);padding:2px 6px;border-radius:4px">FOR ALL USING (true) WITH CHECK (true)</code><br>
        4. category_limits 테이블도 동일하게 적용
      </div>
      <button onclick="retryLoad()" style="margin-top:14px;padding:10px 20px;background:var(--acg);color:var(--ac);border:1px solid rgba(139,127,255,.28);border-radius:11px;font-weight:700;font-size:.86rem">다시 시도</button>
    </div></div>`;
    return;
  }
  if(tab==="list") m.innerHTML = filterBar() + viewList();
  else if(tab==="cat") m.innerHTML = filterBar() + viewCategory();
  else if(tab==="limit") m.innerHTML = viewLimit();
  else if(tab==="analysis"){ m.innerHTML = viewAnalysis(); drawChart(); }
  else if(tab==="acct") m.innerHTML = viewAccount();
  else if(tab==="master") m.innerHTML = viewMaster();
}
async function retryLoad(){
  document.getElementById("main").innerHTML = '<div class="spin"></div>';
  try { await loadAll(); } catch(e) { loadError = e.message; }
  render();
}
function filterBar(){
  const scopes = [["current",`이번 주기 (${billingPeriod().label})`],["all","전체"]];
  const mems = ["전체",...MEMBERS];
  return `<div class="filter">${scopes.map(([k,lb])=>`<span class="pill${scope===k?' on':''}" onclick="setScope('${k}')">${lb}</span>`).join("")}</div>
    <div class="filter">${mems.map(mm=>`<span class="pill${memberFilter===mm?' on':''}" onclick="setMemberFilter('${mm}')">${mm}</span>`).join("")}</div>`;
}
const empty = (ic,msg)=>`<div class="empty"><div class="e-ic">${ic}</div><p>${msg.replace(/\n/g,"<br>")}</p></div>`;

/* 내역 */
function viewList(){
  const rows = scoped(); if(!rows.length) return `<div class="sec">${empty("📭","내역이 없어요.\n＋ 버튼으로 추가해보세요.")}</div>`;
  const inc=rows.filter(r=>r.type==="입금").reduce((s,r)=>s+r.amount,0), exp=rows.filter(r=>r.type!=="입금").reduce((s,r)=>s+r.amount,0);
  const groups={}; rows.forEach(r=>{(groups[r.date]=groups[r.date]||[]).push(r);});
  const days=["일","월","화","수","목","금","토"];
  const dl=s=>{const d=new Date(s);return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;};
  let h=`<div class="sec">`;
  if(scope==="current") h+=`<div class="cards"><div class="card inc"><div class="c-lb">수입</div><div class="c-v g">+${won(inc)}</div></div><div class="card exp"><div class="c-lb">지출</div><div class="c-v r">-${won(exp)}</div></div></div>`;
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    const dr=groups[date], de=dr.filter(r=>r.type!=="입금").reduce((s,r)=>s+r.amount,0);
    h+=`<div class="dgroup"><div class="dhead"><span>${dl(date)}</span><span class="dtot">${de>0?'-'+won(de):''}</span></div>`;
    dr.forEach(r=>{
      const cls=r.type==="입금"?"g":"r", pf=r.type==="입금"?"+":"-";
      h+=`<div class="item"><div class="i-ic">${icon(r.category)}</div><div class="i-bd">
        <div class="i-top"><span class="i-cat">${r.category}</span><span class="i-amt ${cls}">${pf}${won(r.amount)}</span></div>
        <div class="chips">${r.member?`<span class="chip mem">${r.member}</span>`:""}<span class="chip">${r.account}</span>${r.method?`<span class="chip">${r.method}</span>`:""}</div>
        ${r.memo?`<div class="i-memo">${r.memo}</div>`:""}
        <div class="i-act"><button class="b-edit" onclick='editEntry(${JSON.stringify(r)})'>수정</button><button class="b-del" onclick="delEntry('${r.id}')">삭제</button></div>
      </div></div>`;
    });
    h+=`</div>`;
  });
  return h+`</div>`;
}

/* 분류 */
function aggCat(rs){ const o={}; rs.forEach(r=>{(o[r.category]=o[r.category]||{inc:0,exp:0}); r.type==="입금"?o[r.category].inc+=r.amount:o[r.category].exp+=r.amount;}); return o; }
function catCard(cat,v,pct){ const net=v.inc-v.exp;
  let st=""; if(v.inc>0||v.exp>0){ st=`<div class="c-st">`; if(v.inc>0)st+=`<div class="st"><div class="st-l">수입</div><div class="st-v g">+${won(v.inc)}</div></div>`; if(v.exp>0)st+=`<div class="st"><div class="st-l">지출</div><div class="st-v r">-${won(v.exp)}</div></div>`; st+=`</div>`; }
  return `<div class="ccard"><div class="c-h"><div class="c-l"><div class="c-ic">${icon(cat)}</div><div class="c-nm">${cat}</div></div><span class="c-bd ${net>=0?'bg':'br'}">${net>=0?'+':''}${won(net)}</span></div>${st}${pct>0?`<div class="barw"><div class="bar" style="width:${pct}%"></div></div>`:""}</div>`;
}
function viewCategory(){
  const rows=scoped(), sum=aggCat(rows); if(!Object.keys(sum).length) return `<div class="sec">${empty("📭","데이터가 없습니다")}</div>`;
  const totExp=Object.values(sum).reduce((s,v)=>s+v.exp,0);
  let h=`<div class="sec">`;
  Object.entries(sum).sort((a,b)=>b[1].exp-a[1].exp).forEach(([c,v])=>h+=catCard(c,v,totExp?Math.round(v.exp/totExp*100):0));
  if(scope==="all"){ [...recentPeriods(3)].reverse().forEach(p=>{ const ma=aggCat(myRows().filter(r=>inPeriod(r.date,p))); if(!Object.keys(ma).length)return;
    h+=`<div class="sec-t">📅 ${p.label}</div>`; Object.entries(ma).sort((a,b)=>b[1].exp-a[1].exp).forEach(([c,v])=>h+=catCard(c,v,0)); }); }
  return h+`</div>`;
}

/* 한도 */
function viewLimit(){
  const cur=billingPeriod(), spent={};
  ROWS.filter(r=>r.type==="지출"&&inPeriod(r.date,cur)).forEach(r=>spent[r.category]=(spent[r.category]||0)+r.amount);
  const cats = Array.from(new Set([...Object.keys(LIMITS), ...Object.keys(spent)]));
  const items = cats.map(cat=>{ const limit=LIMITS[cat]||0, used=spent[cat]||0; return {cat,limit,used,pct:limit?Math.round(used/limit*100):0}; }).sort((a,b)=>b.pct-a.pct);
  const over = items.filter(i=>i.limit&&i.pct>=100);
  let h=`<div class="sec"><div class="sec-t" style="padding-top:4px">이번 주기 한도 · ${cur.label}</div>`;
  if(over.length) h+=`<div class="alert">⚠️ <b>${over.map(o=>o.cat).join(", ")}</b> 한도 초과!</div>`;
  items.forEach(it=>{
    const state = !it.limit ? "ok" : it.pct>=100?"over":it.pct>=80?"warn":"ok";
    h+=`<div class="lcard ${state}"><div class="l-h"><div class="c-l"><div class="c-ic">${icon(it.cat)}</div><div class="c-nm">${it.cat}</div></div><div class="l-pct ${state}">${it.limit?it.pct+'%':'한도없음'}</div></div>`;
    if(it.limit){ h+=`<div class="l-bar-w"><div class="l-bar ${state}" style="width:${Math.min(it.pct,100)}%"></div></div>
      <div class="l-meta"><span>${won(it.used)}</span><span class="l-lim">/ ${won(it.limit)}</span></div>`;
      if(state==="over") h+=`<div class="l-msg">${won(it.used-it.limit)} 초과</div>`;
      else if(state==="warn") h+=`<div class="l-msg warn">한도까지 ${won(it.limit-it.used)}</div>`;
    } else h+=`<div class="l-meta"><span>이번 주기 ${won(it.used)} 사용</span></div>`;
    h+=`<div class="l-edit"><input id="lim_${it.cat}" inputmode="numeric" placeholder="월 한도" value="${it.limit||''}"><button onclick="saveLimit('${it.cat}')">저장</button></div></div>`;
  });
  return h+`</div>`;
}

/* 분석 */
let chartData=[];
function viewAnalysis(){
  const periods=recentPeriods(3);
  chartData = periods.map(p=>{ const pr=myRows().filter(r=>inPeriod(r.date,p));
    return {name:p.label.split(" ")[0], inc:pr.filter(r=>r.type==="입금").reduce((s,r)=>s+r.amount,0), exp:pr.filter(r=>r.type!=="입금").reduce((s,r)=>s+r.amount,0)}; });
  const byMemo={};
  myRows().filter(r=>r.type==="지출"&&r.memo).forEach(r=>{ const pi=periods.findIndex(p=>inPeriod(r.date,p)); if(pi<0)return;
    const k=r.category+"::"+r.memo.replace(/\(.*\)/,"").trim(); (byMemo[k]=byMemo[k]||{cat:r.category,memo:r.memo,total:0,ps:new Set()}); byMemo[k].total+=r.amount; byMemo[k].ps.add(pi); });
  const list=Object.values(byMemo).map(x=>({...x,span:x.ps.size}));
  const rec=list.filter(x=>x.span>=2).sort((a,b)=>b.total-a.total), one=list.filter(x=>x.span===1&&x.total>=100000).sort((a,b)=>b.total-a.total);
  const avg=Math.round(chartData.reduce((s,d)=>s+d.exp,0)/(chartData.length||1));
  const last=chartData[chartData.length-1]?.exp||0, prev=chartData[chartData.length-2]?.exp||0, tr=prev?Math.round((last-prev)/prev*100):0;
  return `<div class="sec">
    <div class="panel"><div class="p-t">📈 주기별 수입·지출</div><canvas id="chart" height="180"></canvas></div>
    <div class="panel"><div class="p-t">🧾 분석 요약</div><div class="p-body">최근 ${chartData.length}개 주기 평균 지출은 ${won(avg)}입니다.
이번 주기 지출은 전 주기 대비 ${tr>=0?'+':''}${tr}% (${won(last)}).
${rec.length?`반복 지출 ${rec.length}건이 매 주기 빠져나가고 있어요.`:"뚜렷한 반복 지출은 아직 없습니다."}</div></div>
    <div class="panel"><div class="p-t">🔁 반복 지출</div>${rec.length?rec.map(x=>`<div class="arow"><span class="a-mo">${icon(x.cat)} ${x.memo}</span><span class="a-tag rec">${x.span}주기</span><span class="a-v">${won(x.total)}</span></div>`).join(""):'<div class="p-body">없음</div>'}</div>
    <div class="panel"><div class="p-t">💥 일회성 큰 지출</div>${one.length?one.map(x=>`<div class="arow"><span class="a-mo">${icon(x.cat)} ${x.memo}</span><span class="a-tag one">1회</span><span class="a-v">${won(x.total)}</span></div>`).join(""):'<div class="p-body">없음</div>'}</div>
  </div>`;
}
let chartInst=null;
function drawChart(){
  const ctx=document.getElementById("chart"); if(!ctx)return;
  if(chartInst)chartInst.destroy();
  chartInst=new Chart(ctx,{type:"bar",data:{labels:chartData.map(d=>d.name),datasets:[
    {label:"수입",data:chartData.map(d=>d.inc),backgroundColor:"#2DD4A0",borderRadius:6},
    {label:"지출",data:chartData.map(d=>d.exp),backgroundColor:"#FF6B8A",borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{labels:{color:"#7A7AAA",font:{size:11},boxWidth:10}}},
      scales:{x:{ticks:{color:"#7A7AAA",font:{size:11}},grid:{display:false}},y:{ticks:{color:"#484870",font:{size:10},callback:v=>wonShort(v)},grid:{color:"#1B1B2E"}}}}});
}

/* 계좌 */
function viewAccount(){
  let inc=0,exp=0,acct={};
  ROWS.forEach(r=>{ const a=r.account||"미분류"; if(r.type==="입금"){inc+=r.amount;acct[a]=(acct[a]||0)+r.amount;}else{exp+=r.amount;acct[a]=(acct[a]||0)-r.amount;} });
  let h=`<div class="sec"><div class="acct-tot"><div class="at-l">현재 총 잔액</div><div class="at-v">${won(inc-exp)}</div></div>
    <div class="acct-grid"><div class="am"><div class="am-l">총 수입</div><div class="am-v g">+${won(inc)}</div></div><div class="am"><div class="am-l">총 지출</div><div class="am-v r">-${won(exp)}</div></div></div>
    <div class="sec-t">계좌별 잔액</div>`;
  Object.entries(acct).forEach(([nm,b])=>h+=`<div class="acard"><div><div class="a-nm">🏦 ${nm}</div><div class="a-sub">잔액</div></div><div class="a-bal ${b>=0?'g':'r'}">${b>=0?'+':''}${won(b)}</div></div>`);
  return h+`</div>`;
}

/* ── 마스터 데이터 ── */
const MASTER_KEYS = {categories:"카테고리", accounts:"계좌", methods:"결제수단"};
const DEFAULT_CATS = ["식비","생활비","교통","의료","쇼핑","문화","교육","통신","보험","고정비","데이트","월급","이자","기타"];
function getMaster(key){ return JSON.parse(localStorage.getItem("master_"+key)||"null") || (key==="categories"?[...DEFAULT_CATS]:[]); }
function setMaster(key,arr){ localStorage.setItem("master_"+key,JSON.stringify(arr)); }
function addMaster(key){
  const el=document.getElementById("m_input_"+key), val=el.value.trim(); if(!val) return;
  const arr=getMaster(key); if(!arr.includes(val)) arr.push(val);
  setMaster(key,arr); el.value=""; render();
}
function delMaster(key,val){
  setMaster(key, getMaster(key).filter(v=>v!==val)); render();
}
function viewMaster(){
  const icons={categories:"🏷️",accounts:"🏦",methods:"💳"};
  let h=`<div class="sec" style="padding-top:14px">`;
  Object.entries(MASTER_KEYS).forEach(([key,label])=>{
    const items=getMaster(key);
    h+=`<div class="m-section"><div class="m-title">${icons[key]} ${label} 관리</div><div class="m-list">`;
    if(items.length) items.forEach(v=>h+=`<div class="m-item"><span class="m-nm">${v}</span><button class="m-del" onclick="delMaster('${key}','${v}')">삭제</button></div>`);
    else h+=`<div class="m-empty">아래에서 항목을 추가해주세요.</div>`;
    h+=`</div><div class="m-add"><input id="m_input_${key}" placeholder="${label} 추가" onkeydown="if(event.key==='Enter')addMaster('${key}')"><button onclick="addMaster('${key}')">추가</button></div></div>`;
  });
  return h+`</div>`;
}

/* ── 입력 시트 ── */
function refreshCatList(){
  const cats=Array.from(new Set([...getMaster("categories"),...Object.keys(LIMITS),...ROWS.map(r=>r.category)]));
  document.getElementById("catList").innerHTML=cats.map(c=>`<option value="${c}">`).join("");
  const methods=Array.from(new Set([...getMaster("methods"),...ROWS.map(r=>r.method).filter(Boolean)]));
  document.getElementById("methodList").innerHTML=methods.map(m=>`<option value="${m}">`).join("");
  const accounts=Array.from(new Set([...getMaster("accounts"),...ROWS.map(r=>r.account).filter(Boolean)]));
  document.getElementById("accountList").innerHTML=accounts.map(a=>`<option value="${a}">`).join("");
}
function renderMemberSeg(){ document.getElementById("memberSeg").innerHTML = MEMBERS.map(m=>`<button class="${m===memberVal?'on':''}" onclick="setMember('${m}')">${m}</button>`).join(""); }
function setMember(m){ memberVal=m; renderMemberSeg(); }
function setType(t){ typeVal=t; document.getElementById("tgExp").className="tg"+(t==="지출"?" tg-e":""); document.getElementById("tgInc").className="tg"+(t==="입금"?" tg-i":""); }
function openSheet(){ editId=null; document.getElementById("sheetTitle").textContent="내역 추가"; document.getElementById("saveBtn").textContent="저장하기";
  ["fAmount","fCategory","fMethod","fAccount","fMemo"].forEach(id=>document.getElementById(id).value="");
  const t=new Date(); document.getElementById("fDate").value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
  setType("지출"); memberVal=MEMBERS[0]; renderMemberSeg(); refreshCatList();
  document.getElementById("overlay").classList.add("open");
}
function editEntry(r){ editId=r.id; document.getElementById("sheetTitle").textContent="내역 수정"; document.getElementById("saveBtn").textContent="수정하기"; refreshCatList();
  document.getElementById("fDate").value=r.date; document.getElementById("fAmount").value=Number(r.amount).toLocaleString("ko-KR");
  document.getElementById("fCategory").value=r.category; document.getElementById("fMethod").value=r.method||""; document.getElementById("fAccount").value=r.account||""; document.getElementById("fMemo").value=r.memo||"";
  setType(r.type); memberVal=r.member||MEMBERS[0]; renderMemberSeg();
  document.getElementById("overlay").classList.add("open");
}
function closeSheet(){ document.getElementById("overlay").classList.remove("open"); editId=null; }
document.getElementById("fAmount").addEventListener("input",e=>{ const r=e.target.value.replace(/[^0-9]/g,""); e.target.value=r?Number(r).toLocaleString("ko-KR"):""; });
</script>
</body>
</html>
