<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#07080E;
  --bg2:#0C0E18;
  --bg3:#12141F;
  --card:#0E1020;
  --bd:#18192E;
  --bd2:#252742;
  --ac:#C9933A;
  --ac2:#A06F1E;
  --acg:rgba(201,147,58,.13);
  --acg2:rgba(201,147,58,.06);
  --g:#2EC890;
  --gb:rgba(46,200,144,.10);
  --r:#F05470;
  --rb:rgba(240,84,112,.10);
  --amber:#E8961E;
  --amberg:rgba(232,150,30,.10);
  --t1:#EDE8F8;
  --t2:#6E6C8A;
  --t3:#32304E;
  --shadow:0 10px 48px rgba(0,0,0,.7);
  --glow:0 0 40px rgba(201,147,58,.14);
}

html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:'Pretendard','Noto Sans KR',-apple-system,sans-serif;
  background:var(--bg);color:var(--t1);
  line-height:1.6;-webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 500px 350px at 100% 0%, rgba(201,147,58,.08) 0%, transparent 65%),
    radial-gradient(ellipse 300px 400px at 0% 100%, rgba(46,200,144,.035) 0%, transparent 60%);
}

.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:116px;z-index:1}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* ── 헤더 ── */
.hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 20px 13px;
  background:rgba(7,8,14,.9);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-bottom:1px solid rgba(201,147,58,.12);
  position:sticky;top:0;z-index:20;
}
.hd-l{display:flex;align-items:center;gap:12px}
.logo-s{
  width:40px;height:40px;
  background:linear-gradient(140deg,#B8792A,#E0AD50);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 4px 20px rgba(201,147,58,.38),0 1px 3px rgba(0,0,0,.4);
  position:relative;overflow:hidden;flex-shrink:0;
}
.logo-s::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(140deg,rgba(255,255,255,.18) 0%,transparent 55%);
}
.hd-t{
  font-size:1.05rem;font-weight:900;letter-spacing:-.5px;
  background:linear-gradient(120deg,#EDD598 0%,#C9933A 60%,#E8AA55 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hd-r{display:flex;align-items:center;gap:8px}
.hd-chip{
  display:flex;align-items:center;gap:5px;padding:8px 12px;border-radius:20px;
  background:var(--bg3);border:1px solid var(--bd);color:var(--t2);
  font-size:.72rem;font-weight:700;white-space:nowrap;transition:all .18s;
}
.hd-chip:active{border-color:rgba(201,147,58,.4);color:var(--ac)}
.hd-btn{
  width:36px;height:36px;border-radius:12px;flex-shrink:0;
  background:var(--bg3);border:1px solid var(--bd);color:var(--t2);font-size:1.05rem;
  display:flex;align-items:center;justify-content:center;transition:all .18s;
}
.hd-btn:active{border-color:rgba(201,147,58,.4);color:var(--ac)}
.hd-btn.rot{animation:sp .75s linear infinite;color:var(--ac)}

/* ── 네비 ── */
.nav{
  display:flex;
  background:rgba(7,8,14,.88);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-bottom:1px solid var(--bd);
  position:sticky;top:68px;z-index:19;
  padding:0 4px;
}
.tab{
  flex:1;padding:9px 2px 11px;
  font-size:.67rem;font-weight:700;color:var(--t3);
  border-bottom:2px solid transparent;
  transition:color .18s,border-color .18s;
  letter-spacing:.1px;
}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.tab-ic{display:block;font-size:1.15rem;margin-bottom:3px}

/* ── 필터 ── */
.filter{display:flex;gap:6px;padding:14px 16px 0;overflow-x:auto;scrollbar-width:none}
.filter::-webkit-scrollbar{display:none}
.pill{
  flex-shrink:0;padding:6px 15px;border-radius:20px;
  font-size:.76rem;font-weight:700;
  border:1px solid var(--bd2);color:var(--t2);background:var(--bg2);
  white-space:nowrap;transition:all .18s;
}
.pill.on{background:var(--acg);border-color:rgba(201,147,58,.45);color:var(--ac)}
.sec{padding:14px 16px 0}
.g{color:var(--g)}.r{color:var(--r)}

/* ── 내역 검색 ── */
.searchw{padding:12px 16px 0}
.searchw>div{position:relative}
.search-inp{
  width:100%;padding:11px 40px 11px 15px;
  border:1px solid var(--bd);border-radius:14px;
  background:var(--bg2);color:var(--t1);font-family:inherit;font-size:.86rem;
  outline:none;transition:border-color .18s;
}
.search-inp:focus{border-color:var(--ac)}
.search-x{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:24px;height:24px;border-radius:50%;
  background:var(--bg3);color:var(--t3);font-size:.68rem;
  border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;
}

/* ── 요약 카드 ── */
.cards{display:flex;gap:10px;margin-bottom:16px}
.card{
  flex:1;border-radius:22px;padding:18px 16px;
  border:1px solid var(--bd);background:var(--card);
}
.card.inc{
  background:linear-gradient(150deg,rgba(46,200,144,.09) 0%,var(--card) 70%);
  border-color:rgba(46,200,144,.2);
}
.card.exp{
  background:linear-gradient(150deg,rgba(240,84,112,.09) 0%,var(--card) 70%);
  border-color:rgba(240,84,112,.2);
}
.c-lb{font-size:.62rem;font-weight:700;color:var(--t3);margin-bottom:8px;letter-spacing:.9px;text-transform:uppercase}
.c-v{font-size:1.1rem;font-weight:900;letter-spacing:-.7px}

/* ── 날짜 그룹 / 내역 아이템 ── */
.dgroup{margin-bottom:4px}
.dhead{
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 2px 8px;
  font-size:.8rem;font-weight:700;color:var(--t2);
}
.dtot{font-size:.78rem;color:var(--t3);font-weight:600}
.item{
  background:var(--card);
  border:1px solid var(--bd);
  border-radius:20px;
  padding:14px 14px;
  margin-bottom:8px;
  display:flex;gap:12px;
  transition:border-color .2s,transform .2s,box-shadow .2s;
  will-change:transform;
}
.item:active{transform:scale(.99)}
.i-ic{
  width:46px;height:46px;min-width:46px;
  border-radius:13px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:1.28rem;
  border:1px solid var(--bd);
}
.i-bd{flex:1;min-width:0}
.i-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:7px;align-items:flex-start}
.i-cat{font-size:.93rem;font-weight:700;line-height:1.3}
.i-amt{font-size:.98rem;font-weight:900;white-space:nowrap;letter-spacing:-.5px}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{
  font-size:.7rem;color:var(--t3);background:var(--bg3);
  padding:3px 9px;border-radius:6px;font-weight:500;
  border:1px solid var(--bd);
}
.chip.mem{
  background:var(--acg);color:var(--ac);font-weight:700;
  border:1px solid rgba(201,147,58,.22);
}
.chip.trf{
  background:rgba(91,141,239,.12);color:#5B8DEF;font-weight:700;
  border:1px solid rgba(91,141,239,.28);
}
.i-memo{font-size:.79rem;color:var(--t2);margin-top:6px;line-height:1.55}
.i-act{display:flex;gap:6px;margin-top:10px}
.b-edit,.b-del{padding:5px 13px;font-size:.75rem;font-weight:700;border-radius:9px;border:1px solid;transition:all .15s}
.b-edit{border-color:rgba(201,147,58,.22);color:var(--ac);background:rgba(201,147,58,.07)}
.b-edit:hover{background:var(--acg)}
.b-del{border-color:rgba(240,84,112,.22);color:var(--r);background:rgba(240,84,112,.07)}
.b-del:hover{background:var(--rb)}

/* ── 분류 카드 ── */
.ccard{
  background:var(--card);border:1px solid var(--bd);border-radius:20px;
  padding:16px;margin-bottom:10px;transition:border-color .2s;
}
.c-h{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px}
.c-l{display:flex;align-items:center;gap:10px;min-width:0}
.c-ic{
  width:42px;height:42px;min-width:42px;
  border-radius:12px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  border:1px solid var(--bd);
}
.c-nm{font-size:.92rem;font-weight:700}
.c-bd{font-size:.76rem;font-weight:700;padding:5px 12px;border-radius:9px;white-space:nowrap}
.bg{background:var(--gb);color:var(--g)}.br{background:var(--rb);color:var(--r)}
.c-st{display:flex;gap:8px;margin-bottom:11px}
.st{flex:1;background:var(--bg3);border-radius:11px;padding:10px 12px;border:1px solid var(--bd)}
.st-l{font-size:.6rem;font-weight:700;color:var(--t3);margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.st-v{font-size:.84rem;font-weight:700}
.barw{height:4px;background:var(--bg3);border-radius:2px}
.bar{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--ac2),var(--ac));transition:width .4s}
.sec-t{font-size:.66rem;font-weight:700;color:var(--t3);letter-spacing:.9px;text-transform:uppercase;padding:16px 2px 8px}

/* ── 한도 ── */
.alert{
  background:rgba(240,84,112,.07);border:1px solid rgba(240,84,112,.22);
  color:var(--r);border-radius:14px;padding:12px 16px;
  font-size:.84rem;font-weight:700;margin-bottom:12px;
}
.lcard{
  background:var(--card);border:1px solid var(--bd);
  border-radius:20px;padding:16px;margin-bottom:10px;
}
.lcard.over{
  border-color:rgba(240,84,112,.35);
  background:linear-gradient(150deg,rgba(240,84,112,.06),var(--card));
}
.lcard.warn{
  border-color:rgba(232,150,30,.3);
  background:linear-gradient(150deg,rgba(232,150,30,.05),var(--card));
}
.l-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.l-pct{font-size:1.04rem;font-weight:900}
.l-pct.ok{color:var(--ac)}.l-pct.warn{color:var(--amber)}.l-pct.over{color:var(--r)}
.l-bar-w{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:10px}
.l-bar{height:6px;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.l-bar.ok{background:linear-gradient(90deg,var(--ac2),var(--ac))}
.l-bar.warn{background:linear-gradient(90deg,#b07010,var(--amber))}
.l-bar.over{background:linear-gradient(90deg,#b01035,var(--r))}
.l-meta{display:flex;gap:8px;font-size:.82rem;font-weight:700;align-items:center}
.l-lim{color:var(--t3);font-weight:500}
.l-msg{margin-top:6px;font-size:.76rem;font-weight:700;color:var(--r)}
.l-msg.warn{color:var(--amber)}
.l-edit{margin-top:12px;display:flex;gap:8px}
.l-edit input{
  flex:1;padding:9px 13px;border:1px solid var(--bd);border-radius:10px;
  background:var(--bg2);color:var(--t1);font-family:inherit;font-size:.84rem;
  outline:none;transition:border-color .18s;
}
.l-edit input:focus{border-color:var(--ac)}
.l-edit button{
  padding:9px 16px;border-radius:10px;background:var(--acg);color:var(--ac);
  font-weight:700;font-size:.78rem;border:1px solid rgba(201,147,58,.22);transition:all .15s;
}
.l-edit button:hover{background:rgba(201,147,58,.2)}

/* ── 분석 ── */
.panel{
  background:var(--card);border:1px solid var(--bd);
  border-radius:20px;padding:18px;margin-bottom:12px;
}
.p-t{font-size:.9rem;font-weight:700;margin-bottom:14px}
.p-body{font-size:.83rem;line-height:2;color:var(--t2);white-space:pre-line}
.arow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)}
.arow:last-child{border:none}
.a-mo{flex:1;font-size:.83rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.a-tag{font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:8px}
.a-tag.rec{background:var(--acg);color:var(--ac);border:1px solid rgba(201,147,58,.2)}
.a-tag.one{background:var(--gb);color:var(--g);border:1px solid rgba(46,200,144,.18)}
.a-v{font-size:.83rem;font-weight:700;white-space:nowrap}

/* 분석 요약 메트릭 카드 */
.astat{display:flex;gap:9px;margin-bottom:14px}
.astat .am{flex:1;position:relative;overflow:hidden;padding:13px 12px 14px}
.astat .am::before{content:'';position:absolute;left:0;top:11px;bottom:11px;width:3px;border-radius:3px;background:linear-gradient(var(--ac),var(--ac2));opacity:.6}
.astat .am-l{margin-bottom:2px}
.astat .am-v{font-size:1.05rem;font-weight:900;letter-spacing:-.6px;margin-top:2px}
.am-sub{font-size:.64rem;font-weight:700;color:var(--t2);margin-top:6px}
.am-d{display:inline-flex;align-items:center;gap:2px;font-size:.63rem;font-weight:800;padding:1px 7px;border-radius:20px}
.am-d.r{color:var(--r);background:var(--rb)}
.am-d.g{color:var(--g);background:var(--gb)}
.am-d.f{color:var(--t2);background:var(--bg3)}

/* 도넛 차트 (중앙 총액 + 커스텀 범례) */
.donut-wrap{position:relative;max-width:280px;margin:0 auto}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.dc-l{font-size:.6rem;color:var(--t3);font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.dc-v{font-size:1.18rem;font-weight:900;color:var(--t1);letter-spacing:-.5px}
.dlegend{display:flex;flex-wrap:wrap;gap:7px 14px;margin-top:16px;justify-content:center}
.dlg{display:flex;align-items:center;gap:6px;font-size:.76rem}
.dlg-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.dlg-nm{color:var(--t2);font-weight:600}
.dlg-v{color:var(--t3);font-weight:700}

/* 스마트 분석 인사이트 카드 */
.ins{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--bd)}
.ins:last-child{border:none;padding-bottom:0}
.ins-ic{width:34px;height:34px;min-width:34px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.05rem;border:1px solid var(--bd)}
.ins-bd{flex:1;min-width:0}
.ins-t{font-size:.85rem;font-weight:700;margin-bottom:3px;line-height:1.45}
.ins-b{font-size:.78rem;color:var(--t2);line-height:1.65}
.ins.warn .ins-ic{background:var(--rb);border-color:rgba(240,84,112,.25)}
.ins.warn .ins-t{color:var(--r)}
.ins.tip .ins-ic{background:var(--acg);border-color:rgba(201,147,58,.25)}
.ins.tip .ins-t{color:var(--ac)}
.ins.good .ins-ic{background:var(--gb);border-color:rgba(46,200,144,.25)}
.ins.good .ins-t{color:var(--g)}

/* ── 계좌 ── */
.acct-tot{
  border-radius:24px;padding:24px 22px 22px;margin-bottom:14px;
  background:linear-gradient(145deg,#8A5A12 0%,#C9933A 45%,#E8B85A 100%);
  box-shadow:0 12px 48px rgba(201,147,58,.32),0 2px 10px rgba(0,0,0,.45);
  position:relative;overflow:hidden;
}
.acct-tot::before{
  content:'';position:absolute;top:-50px;right:-50px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.07);pointer-events:none;
}
.acct-tot::after{
  content:'₩';position:absolute;bottom:-14px;left:18px;
  font-size:6rem;font-weight:900;color:rgba(0,0,0,.06);
  line-height:1;pointer-events:none;letter-spacing:-4px;
}
.at-l{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.6);margin-bottom:8px;letter-spacing:.8px;text-transform:uppercase}
.at-v{font-size:2rem;font-weight:900;color:#fff;letter-spacing:-1.5px;text-shadow:0 2px 8px rgba(0,0,0,.18);position:relative;z-index:1}
.acct-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.am{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:14px}
.am-l{font-size:.66rem;font-weight:700;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.am-v{font-size:.98rem;font-weight:700;letter-spacing:-.3px}
.acard{
  background:var(--card);border:1px solid var(--bd);border-radius:16px;
  padding:14px 16px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;
  transition:border-color .2s;
}
.a-nm{font-size:.9rem;font-weight:700}
.a-sub{font-size:.7rem;color:var(--t3);margin-top:2px}
.a-bal{font-size:.95rem;font-weight:700;letter-spacing:-.3px}

/* ── FAB ── */
.fab{
  position:fixed;bottom:28px;
  right:calc(50% - 240px + 20px);
  width:54px;height:54px;
  background:linear-gradient(140deg,#A06F1E,#D4A030);
  color:#fff;border-radius:16px;font-size:1.55rem;
  box-shadow:0 8px 36px rgba(201,147,58,.50),0 2px 6px rgba(0,0,0,.35);
  z-index:30;display:flex;align-items:center;justify-content:center;
  transition:transform .18s,box-shadow .18s;
}
.fab:active{transform:scale(.92);box-shadow:0 4px 20px rgba(201,147,58,.4)}
@media(max-width:480px){.fab{right:20px}}

.toast{
  position:fixed;bottom:110px;left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--bd2);
  padding:10px 22px;border-radius:26px;
  font-size:.8rem;font-weight:700;
  z-index:40;opacity:0;transition:opacity .22s;
  pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 36px rgba(0,0,0,.55);
}
.toast.show{opacity:1}

.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.e-ic{font-size:2.4rem;margin-bottom:12px;opacity:.45}
.empty p{font-size:.84rem;line-height:2}

.spin{
  width:26px;height:26px;
  border:2px solid var(--bd2);border-top-color:var(--ac);
  border-radius:50%;animation:sp .75s linear infinite;margin:72px auto;
}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── 오버레이 / 시트 ── */
.overlay{display:none;position:fixed;inset:0;z-index:50;background:var(--bg);overflow-y:auto;overscroll-behavior:contain}
.overlay.open{display:block}
body.sheet-open{overflow:hidden}
.sheet{max-width:480px;margin:0 auto;min-height:100dvh}
.s-top{
  display:flex;justify-content:space-between;align-items:center;
  padding:17px 20px;
  background:rgba(7,8,14,.95);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-bottom:1px solid var(--bd);position:sticky;top:0;
}
.s-t{font-size:1rem;font-weight:900;letter-spacing:-.3px}
.s-x{
  background:var(--bg3);border:1px solid var(--bd);border-radius:20px;
  color:var(--t2);font-size:.79rem;font-weight:700;padding:7px 15px;
  transition:all .18s;
}

.frow{margin-bottom:17px}

}

.picker-opt.on{color:var(--ac);background:var(--acg2)}

/* ── 분석 패널 보강 ── */
.p-t{display:flex;align-items:center;gap:8px}
.p-t::before{content:'';width:3px;height:14px;border-radius:3px;background:linear-gradient(var(--ac),var(--ac2));flex-shrink:0}
.p-sub{font-size:.64rem;font-weight:700;color:var(--t3);margin-left:auto;letter-spacing:.2px;
  background:var(--bg3);border:1px solid var(--bd);padding:2px 9px;border-radius:20px}
/* 일회성 이상치 행 */
.anom{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--bd)}
.anom:last-child{border:none;padding-bottom:0}
.anom-ic{width:36px;height:36px;min-width:36px;border-radius:11px;background:var(--bg3);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;font-size:1.05rem}
.anom-bd{flex:1;min-width:0}
.anom-t{display:flex;align-items:center;gap:7px;min-width:0}
.anom-tt{font-size:.86rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.anom-x{flex-shrink:0;font-size:.6rem;font-weight:800;color:var(--amber);background:var(--amberg);
  border:1px solid rgba(232,150,30,.28);padding:1px 8px;border-radius:20px}
.anom-s{font-size:.71rem;color:var(--t2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.anom-v{font-size:.9rem;font-weight:900;color:var(--r);white-space:nowrap;letter-spacing:-.3px}

/* ── 진입 모션 (한 번, staggered) ── */
@keyframes riseIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
.panel,.cards .card,.astat .am,.acct-tot,.acct-grid .am,.m-section,.lcard{
  animation:riseIn .38s cubic-bezier(.22,.61,.36,1) both}
.panel:nth-child(2){animation-delay:.03s}.panel:nth-child(3){animation-delay:.06s}
.panel:nth-child(4){animation-delay:.09s}.panel:nth-child(5){animation-delay:.12s}
.panel:nth-child(6){animation-delay:.15s}.panel:nth-child(7){animation-delay:.18s}
.astat .am:nth-child(2){animation-delay:.04s}.astat .am:nth-child(3){animation-delay:.08s}
@media(prefers-reduced-motion:reduce){
  .panel,.cards .card,.astat .am,.acct-tot,.acct-grid .am,.m-section,.lcard{animation:none}
}
</style>

<body>

<div class="app" id="appView">
  <header class="hd">
    <div class="hd-l">
      <div class="logo-s">💰</div>

    </div>

<script>
/* ── 상수 ── */
const DEFAULT_CATS = ["식비","생활비","교통","의료","쇼핑","문화","교육","통신","보험","고정비","데이트","월급","이자","기타"];
const TRANSFER_CAT = "계좌간 이동";  // 계좌간 이동 거래 카테고리 — 소비/수입 통계에선 제외, 계좌 잔액엔 반영
const MASTER_KEYS  = {categories:"카테고리", methods:"결제수단", accounts:"계좌"};
const MASTER_TYPE  = {categories:"category", methods:"method", accounts:"account"};  // JS key → DB type
const MASTER_KEY_OF= {category:"categories", method:"methods", account:"accounts"};   // DB type → JS key
const DEVICE_USER_KEY = "ourbudget.deviceUser";  // localStorage: 이 기기의 기본 사용자
// 구글 시트 백업 (Apps Script 웹앱). URL 비우면 백업 비활성.
const GAS_BACKUP_URL    = "https://script.google.com/macros/s/AKfycbweq9PLy5VDBa68VN-76aWL8wUW6nvLZOlVaktn5oZE-HMkwg_iuXNGP6dBfcqjH56G/exec";  // Apps Script 웹앱
const GAS_BACKUP_SECRET = "ourbudget-backup-2026";  // GAS 코드의 SECRET과 동일하게
const CAT_ICON     = {생활비:"🛒",고정비:"🏠",월급:"💵",이자:"📈",데이트:"❤️",식비:"🍽️",교통:"🚌",의료:"💊",쇼핑:"👜",문화:"🎬",교육:"📚",통신:"📱",보험:"🛡️",기타:"📌","계좌간 이동":"🔄"};
const TABS         = [["list","📋","내역"],["cat","📊","분류"],["limit","🎯","한도"],["analysis","📈","분석"],["acct","🏦","계좌"],["master","⚙️","설정"]];

/* ── 상태 ── */
let sb;
let MEMBERS       = [];     // DB에서 동적 로드
let ROWS          = [];
let LIMITS        = {};     // {멤버: {카테고리: 금액}}
let MASTER        = {};     // {멤버: {categories, methods, accounts}}
let BILLING_STARTS = {};    // {멤버: 시작일} — app_settings에서 로드
let DEVICE_USER    = null;  // 이 기기의 기본 사용자 (localStorage)
let USER_ICONS     = {};    // {카테고리: 이모지} — app_settings의 cat_icon_* (전 멤버 공통)
let WARN_TH        = 80;    // 한도 경고 임계값(%) — app_settings.warn_threshold
let AN_PERIODS     = 3;     // 분석·분류 탭 표시 주기 수 — app_settings.analysis_periods

let tab          = "list";
let scope        = "current";
let memberFilter = "전체";  // 내역·분류·계좌 탭 공통 필터
let searchQ      = "";      // 내역 탭 검색어
let catBy        = "category"; // 분류 탭 집계 기준: 'category' | 'method'
let limitMember  = null;    // 한도 탭 전용
let masterMember = null;    // 설정 탭 전용
let typeVal      = "지출";
let memberVal    = null;    // 입력 시트
let editId       = null;
let loadError    = null;

/* ── 유틸 ── */
const won      = n => Number(n||0).toLocaleString("ko-KR")+"원";
const wonShort = n => n>=10000 ? (n/10000).toFixed(n%10000?1:0)+"만" : Number(n).toLocaleString("ko-KR");
const icon     = c => USER_ICONS[c] || CAT_ICON[c] || "💳";
// HTML 이스케이프 — 사용자 입력(메모·항목명·멤버명 등)을 innerHTML에 넣을 때 필수
const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
// onclick="fn('…')" 속 JS 문자열 리터럴용 — JS 이스케이프 후 HTML 이스케이프 (따옴표 든 항목명에도 안전)
const jsq = s => esc(String(s==null?"":s).replace(/\\/g,"\\\\").replace(/'/g,"\\'"));
const toast    = m => { const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1800); };
const empty    = (ic,msg) => `<div class="empty"><div class="e-ic">${ic}</div><p>${msg.replace(/\n/g,"<br>")}</p></div>`;
// 기기 기본 사용자가 멤버 목록에 있으면 그 사람을, 없으면 첫 멤버를 기본값으로
const defMember = () => (DEVICE_USER && MEMBERS.includes(DEVICE_USER)) ? DEVICE_USER : (MEMBERS[0]||null);

// 계좌간 이동 거래 여부 — 소비/수입 통계에선 제외, 계좌 잔액엔 포함
const isTransfer = r => r.category===TRANSFER_CAT;
// 합계 헬퍼 (지출/수입) — 여러 뷰에서 반복되던 filter+reduce 통합. 이동은 합계에서 제외
const expOf = rs => rs.reduce((s,r)=>s+((r.type!=="입금"&&!isTransfer(r))?r.amount:0),0);
const incOf = rs => rs.reduce((s,r)=>s+((r.type==="입금"&&!isTransfer(r))?r.amount:0),0);
// 카테고리 색상 — 이름 기반 고정 해시(같은 카테고리는 항상 같은 색)
// 다크모드에서 또렷이 구분되는 12색(웜/쿨 교차, 초록 계열 최소화). 도넛·스택·추이 공통.
const CAT_PALETTE = ["#FF6B6B","#4DABF7","#FFA94D","#9775FA","#51CF66","#F06595","#FFD43B","#22B8CF","#DA77F2","#C99A5B","#20C997","#5C7CFA"];
// 카테고리 색은 '처음 등장한 순서'대로 팔레트를 배정 → 서로 다른 카테고리는 항상 다른 색.
// (기존 이름 해시 방식은 카페·문화·데이트·이자·기타가 같은 칸[4]에 몰려 전부 초록으로 보이던 문제가 있었음)
let _catOrder = [];
function catColor(c){
  const s = String(c);
  let i = _catOrder.indexOf(s);
  if(i < 0){ i = _catOrder.length; _catOrder.push(s); }
  return CAT_PALETTE[i % CAT_PALETTE.length];
}
// 고정성 지출 카테고리 (절약 팁/고정·변동 분석에서 '고정'으로 분류)
const FIXED_CATS = new Set(["고정비","통신","보험","이자","월세","관리비","교육","구독","월급"]);

/* ── 결제 주기 ── */
function billingPeriod(member, ref){
  const sd=(member&&BILLING_STARTS[member])||25;
  ref=ref||new Date(); const d=ref.getDate(),m=ref.getMonth(),y=ref.getFullYear();
  const ed=sd>1?sd-1:new Date(y,m+1,0).getDate();
  let sy,sm,ey,em;
  if(d>=sd){sy=y;sm=m;ey=m===11?y+1:y;em=m===11?0:m+1;}
  else{sy=m===0?y-1:y;sm=m===0?11:m-1;ey=y;em=m;}
  return {start:new Date(sy,sm,sd),end:new Date(ey,em,ed,23,59,59),label:`${sm+1}/${sd} ~ ${em+1}/${ed}`,key:`${sy}-${String(sm+1).padStart(2,"0")}`};
}
function recentPeriods(n, member){
  member=member||MEMBERS[0];
  const sd=(member&&BILLING_STARTS[member])||25;
  const cur=billingPeriod(member);
  return Array.from({length:n},(_,i)=>billingPeriod(member,new Date(cur.start.getFullYear(),cur.start.getMonth()-(n-1-i),sd)));
}
const inPeriod = (s,p) => { const d=new Date(s.length===10?s+"T12:00:00":s); return d>=p.start&&d<=p.end; };

/* ── 데이터 로드 ── */
async function loadAll(){
  loadError = null;
  const [mem, tx, lim, mst, cfg] = await Promise.all([
    sb.from("members").select("name").order("id"),
    sb.from("transactions").select("*").order("date",{ascending:false}),
    sb.from("category_limits").select("*"),
    sb.from("master_data").select("*"),
    sb.from("app_settings").select("*")
  ]);

  if(mem.error) throw new Error("멤버 로드 오류: "+mem.error.message);
  MEMBERS = (mem.data||[]).map(m=>m.name);

  // 탭별 선택 멤버를 MEMBERS 목록에 맞게 보정 (기기 사용자 우선)
  if(!MEMBERS.includes(limitMember))  limitMember  = defMember();
  if(!MEMBERS.includes(masterMember)) masterMember = defMember();
  if(!MEMBERS.includes(memberVal))    memberVal    = defMember();

  if(tx.error) throw new Error(tx.error.message||"거래내역 로드 오류");
  ROWS = tx.data||[];

  // LIMITS: {멤버: {카테고리: 금액}}
  LIMITS = {};
  MEMBERS.forEach(m => LIMITS[m] = {});
  if(!lim.error)(lim.data||[]).forEach(l => {
    if(!LIMITS[l.member]) LIMITS[l.member] = {};
    LIMITS[l.member][l.category] = Number(l.monthly_limit);
  });

  // MASTER: {멤버: {categories, methods, accounts}}
  MASTER = {};
  MEMBERS.forEach(m => MASTER[m] = {categories:[],methods:[],accounts:[]});
  if(!mst.error)(mst.data||[]).forEach(row => {
    if(!MASTER[row.member]) MASTER[row.member] = {categories:[],methods:[],accounts:[]};
    const key = MASTER_KEY_OF[row.type] || 'accounts';
    MASTER[row.member][key].push(row.value);
  });
  MEMBERS.forEach(m => { if(!MASTER[m].categories.length) MASTER[m].categories=[...DEFAULT_CATS]; });

  // app_settings: 전역 fallback → 멤버별 override + 앱 설정·카테고리 아이콘
  BILLING_STARTS={}; USER_ICONS={}; WARN_TH=80; AN_PERIODS=3;
  let _globalBS=25;
  if(!cfg.error)(cfg.data||[]).forEach(row=>{
    if(row.key==='billing_start_day'){const v=Number(row.value);if(v>=1&&v<=28)_globalBS=v;}
    if(row.key.startsWith('billing_start_')){
      const mem=row.key.slice('billing_start_'.length);
      if(MEMBERS.includes(mem)){const v=Number(row.value);if(v>=1&&v<=28)BILLING_STARTS[mem]=v;}
    }
    if(row.key==='warn_threshold'){const v=Number(row.value);if(v>=50&&v<=99)WARN_TH=v;}
    if(row.key==='analysis_periods'){const v=Number(row.value);if(v>=2&&v<=6)AN_PERIODS=v;}
    if(row.key.startsWith('cat_icon_')&&row.value)USER_ICONS[row.key.slice('cat_icon_'.length)]=row.value;
  });
  MEMBERS.forEach(m=>{if(!(m in BILLING_STARTS))BILLING_STARTS[m]=_globalBS;});
}

/* ── 구글 시트 백업 (단방향, fire-and-forget) ── */
function backupToSheet(action, payload){
  if(!GAS_BACKUP_URL) return;  // URL 미설정 시 비활성
  try{
    fetch(GAS_BACKUP_URL, {
      method:"POST", mode:"no-cors", keepalive:true,
      headers:{"Content-Type":"text/plain;charset=utf-8"},  // preflight 회피
      body: JSON.stringify({secret:GAS_BACKUP_SECRET, action, ...payload})
    }).catch(()=>{});  // 백업 실패는 앱 동작에 영향 없음
  }catch(e){}
}

/* ── 거래 저장/삭제 ── */
async function saveEntry(){
  const amount = Number(document.getElementById("fAmount").value.replace(/,/g,""));
  if(typeVal==="이동"){ return saveTransfer(amount); }
  const row = {
    date:     document.getElementById("fDate").value,
    amount,
    type:     typeVal,
    member:   memberVal,
    category: document.getElementById("fCategory").value,
    method:   document.getElementById("fMethod").value,
    account:  document.getElementById("fAccount").value,
    memo:     document.getElementById("fMemo").value.trim()
  };
  if(!row.amount||!row.category||!row.account){ toast("금액·카테고리·계좌는 필수예요"); return; }
  const btn=document.getElementById("saveBtn");
  btn.textContent="저장 중..."; btn.disabled=true;
  const wasEdit=!!editId;
  try {
    let savedId=editId;
    if(wasEdit){
      const res=await sb.from("transactions").update(row).eq("id",editId);
      if(res.error){ toast("저장 오류: "+res.error.message); return; }
    } else {
      const res=await sb.from("transactions").insert(row).select("id").single();
      if(res.error){ toast("저장 오류: "+res.error.message); return; }
      savedId=res.data&&res.data.id;
    }
    backupToSheet("upsert",{id:savedId,...row});  // 구글 시트 백업
    closeSheet(); await loadAll(); render();
    toast(wasEdit?"수정 완료":"저장 완료");
  } catch(e){ toast("오류: "+e.message); }
  finally{ btn.textContent=wasEdit?"수정하기":"저장하기"; btn.disabled=false; }
}

// 계좌간 이동: 출금계좌 지출 + 입금계좌 입금 2건을 한 번에 생성 (category='계좌간 이동')
async function saveTransfer(amount){
  const from = document.getElementById("fFromAccount").value;
  const to   = document.getElementById("fToAccount").value;
  const date = document.getElementById("fDate").value;
  const memo = document.getElementById("fMemo").value.trim();
  if(!amount||!from||!to){ toast("금액·출금계좌·입금계좌는 필수예요"); return; }
  if(from===to){ toast("출금·입금 계좌가 같아요"); return; }
  const memoTxt = memo || `${from} → ${to}`;
  const base = { date, amount, member:memberVal, category:TRANSFER_CAT, method:"", memo:memoTxt };
  const out  = { ...base, type:"지출", account:from };  // 출금계좌에서 빠짐
  const inn  = { ...base, type:"입금", account:to };    // 입금계좌로 들어옴
  const btn=document.getElementById("saveBtn");
  btn.textContent="저장 중..."; btn.disabled=true;
  try {
    // 삽입된 행 전체를 받아 각 행 데이터 그대로 백업(반환 순서에 의존하지 않아 id-행 매칭 안전)
    const res=await sb.from("transactions").insert([out,inn]).select();
    if(res.error){ toast("저장 오류: "+res.error.message); return; }
    (res.data||[]).forEach(row=>backupToSheet("upsert",row));  // 구글 시트 백업(출금·입금 2건)
    closeSheet(); await loadAll(); render();
    toast("이동 완료");
  } catch(e){ toast("오류: "+e.message); }
  finally{ btn.textContent="저장하기"; btn.disabled=false; }
}

async function delEntry(id){
  const r = ROWS.find(x=>x.id===id);
  const trf = r && isTransfer(r);
  // 이동이면 짝(반대편 leg)을 찾아 함께 삭제 → 한쪽만 남아 잔액이 깨지는 것 방지
  const mate = trf ? ROWS.find(x=>x.id!==id && isTransfer(x) && x.member===r.member
      && x.date===r.date && Number(x.amount)===Number(r.amount) && x.type!==r.type) : null;
  if(!confirm(trf?"계좌간 이동 거래예요. 출금·입금 양쪽이 함께 삭제됩니다. 계속할까요?":"삭제하시겠습니까?")) return;
  const ids = mate ? [id, mate.id] : [id];
  const res=await sb.from("transactions").delete().in("id",ids);
  if(res.error){ toast("삭제 오류: "+res.error.message); return; }
  ids.forEach(x=>backupToSheet("delete",{id:x}));  // 구글 시트 백업(양쪽 모두)
  await loadAll(); render(); toast(mate?"이동(2건) 삭제 완료":"삭제 완료");
}

    ? await sb.from("category_limits").upsert({member, category:cat, monthly_limit:v},{onConflict:"member,category"})
    : await sb.from("category_limits").delete().eq("member",member).eq("category",cat);
  if(res.error){ toast("한도 저장 오류: "+res.error.message); return; }
  await loadAll(); render(); toast(v>0?"한도 저장":"한도 삭제");
}

/* ── 결제 주기 저장 (멤버별) ── */
async function saveBillingStart(member){
  const raw=Number(document.getElementById(`m_billing_start_${member}`).value);
  const v=Math.max(1,Math.min(28,raw||25));
  const res=await sb.from("app_settings").upsert({key:`billing_start_${member}`,value:String(v)},{onConflict:"key"});
  if(res.error){ toast("오류: "+res.error.message); return; }
  BILLING_STARTS[member]=v;
  render();
  const ed=v>1?v-1:31;
  toast(`${member}의 주기: 매월 ${v}일 ~ 다음달 ${ed}일`);
}

/* ── 앱 설정 저장 (전역, app_settings) ── */
async function saveAppSetting(key, elId, min, max, def, unit){
  const raw=Number(document.getElementById(elId).value);
  const v=Math.max(min,Math.min(max,raw||def));
  const res=await sb.from("app_settings").upsert({key,value:String(v)},{onConflict:"key"});
  if(res.error){ toast("오류: "+res.error.message); return; }
  if(key==="warn_threshold")WARN_TH=v;
  if(key==="analysis_periods")AN_PERIODS=v;
  render(); toast(`저장했어요: ${v}${unit||""}`);
}

/* ── 분류 탭 ── */
// field: 'category' | 'method' — 분류 탭 집계 기준. 값이 비면 '미지정'으로 묶음 (입금 등 결제수단 없는 건)
function aggCat(rs, field="category"){ const o={}; rs.forEach(r=>{ if(isTransfer(r)) return; const k=r[field]||"미지정"; (o[k]=o[k]||{inc:0,exp:0}); r.type==="입금"?o[k].inc+=r.amount:o[k].exp+=r.amount;}); return o; }
function catCard(cat,v,pct){
  const net=v.inc-v.exp;
  let st="";
  if(v.inc>0||v.exp>0){
    st=`<div class="c-st">`;
    if(v.inc>0) st+=`<div class="st"><div class="st-l">수입</div><div class="st-v g">+${won(v.inc)}</div></div>`;
    if(v.exp>0) st+=`<div class="st"><div class="st-l">지출</div><div class="st-v r">-${won(v.exp)}</div></div>`;
    st+=`</div>`;
  }
  return `<div class="ccard"><div class="c-h"><div class="c-l"><div class="c-ic">${icon(cat)}</div><div class="c-nm">${esc(cat)}</div></div><span class="c-bd ${net>=0?'bg':'br'}">${net>=0?'+':''}${won(net)}</span></div>${st}${pct>0?`<div class="barw"><div class="bar" style="width:${pct}%"></div></div>`:""}</div>`;
}
function viewCategory(){
  const field = catBy==="method" ? "method" : "category";
  const byBar=`<div class="filter">${[["category","카테고리별"],["method","결제수단별"]].map(([k,lb])=>`<span class="pill${catBy===k?' on':''}" onclick="setCatBy('${k}')">${lb}</span>`).join("")}</div>`;
  const rows=scoped(), sum=aggCat(rows,field);
  if(!Object.keys(sum).length) return byBar+`<div class="sec">${empty("📭","데이터가 없습니다")}</div>`;
  const totExp=Object.values(sum).reduce((s,v)=>s+v.exp,0);
  let h=byBar+`<div class="sec">`;
  Object.entries(sum).sort((a,b)=>b[1].exp-a[1].exp).forEach(([c,v])=>h+=catCard(c,v,totExp?Math.round(v.exp/totExp*100):0));
  if(scope==="all"){
    const _catMem=memberFilter!=="전체"?memberFilter:MEMBERS[0];
    [...recentPeriods(AN_PERIODS,_catMem)].reverse().forEach(p=>{
      const ma=aggCat(myRows().filter(r=>inPeriod(r.date,p)),field);
      if(!Object.keys(ma).length) return;
      h+=`<div class="sec-t">📅 ${p.label}</div>`;
      Object.entries(ma).sort((a,b)=>b[1].exp-a[1].exp).forEach(([c,v])=>h+=catCard(c,v,0));
    });
  }
  return h+`</div>`;
}

function viewLimit(){
  if(!limitMember) return `<div class="sec">${empty("👥","설정에서 멤버를 추가해주세요.")}</div>`;
  const cur=billingPeriod(limitMember);
  const memberLimits=LIMITS[limitMember]||{};
  const spent={};
  ROWS.filter(r=>r.member===limitMember&&r.type==="지출"&&!isTransfer(r)&&inPeriod(r.date,cur))
      .forEach(r=>spent[r.category]=(spent[r.category]||0)+r.amount);

  // 한도 지정 대상 = 멤버가 설정한 카테고리(master_data) + 이미 한도가 저장된 카테고리(레거시 보존)
  // → '계좌간 이동'처럼 설정 카테고리에 없는 지출 항목은 한도 UI에 노출하지 않음
  const memberCats=(MASTER[limitMember]&&MASTER[limitMember].categories)||[];
  const cats=Array.from(new Set([...memberCats,...Object.keys(memberLimits)]));
  const items=cats.map(cat=>{
    const limit=memberLimits[cat]||0, used=spent[cat]||0;
    return {cat,limit,used,pct:limit?Math.round(used/limit*100):0};
  }).sort((a,b)=>b.pct-a.pct);
  const over=items.filter(i=>i.limit&&i.pct>=100);

  let h=memberBar(limitMember,"setLimitMember")+`<div class="sec">`;
  h+=`<div class="sec-t" style="padding-top:4px">${esc(limitMember)}의 이번 주기 한도 · ${cur.label}</div>`;
  if(over.length) h+=`<div class="alert">⚠️ <b>${over.map(o=>esc(o.cat)).join(", ")}</b> 한도 초과!</div>`;

  if(!items.length){
    h+=empty("🎯","지출 내역이나 설정된 한도가 없어요.\n아래에서 한도를 직접 추가할 수 있어요.");
  } else {
    items.forEach(it=>{
      const state=!it.limit?"ok":it.pct>=100?"over":it.pct>=WARN_TH?"warn":"ok";
      h+=`<div class="lcard ${state}">
        <div class="l-h"><div class="c-l"><div class="c-ic">${icon(it.cat)}</div><div class="c-nm">${esc(it.cat)}</div></div><div class="l-pct ${state}">${it.limit?it.pct+'%':'한도없음'}</div></div>`;
      if(it.limit){
        h+=`<div class="l-bar-w"><div class="l-bar ${state}" style="width:${Math.min(it.pct,100)}%"></div></div>
          <div class="l-meta"><span>${won(it.used)}</span><span class="l-lim">/ ${won(it.limit)}</span></div>`;
        if(state==="over") h+=`<div class="l-msg">${won(it.used-it.limit)} 초과</div>`;
        else if(state==="warn") h+=`<div class="l-msg warn">한도까지 ${won(it.limit-it.used)}</div>`;
      } else {
        h+=`<div class="l-meta"><span>이번 주기 ${won(it.used)} 사용</span></div>`;
      }
      h+=`<div class="l-edit"><input id="lim_${esc(limitMember)}_${esc(it.cat)}" inputmode="numeric" placeholder="월 한도 (비우면 삭제)" value="${it.limit?Number(it.limit).toLocaleString('ko-KR'):''}" oninput="fmtNum(this)"><button onclick="saveLimit('${jsq(limitMember)}','${jsq(it.cat)}')">저장</button></div>
      </div>`;
    });
  }
  return h+`</div>`;
}

/* ── 분석 탭 ── */
let _anStash = null;   // 차트용 데이터 보관 (viewAnalysis → drawAnalysisCharts)

/* 분석 보조 ── 카테고리 '평소 금액(중앙값)' 대비 크게 튄 개별 지출(일회성 이상치) 추출 */
const _median = a => { const s=[...a].sort((x,y)=>x-y), n=s.length; return n?(n%2?s[(n-1)/2]:(s[n/2-1]+s[n/2])/2):0; };
const _md     = s => { const d=new Date(s.length===10?s+"T12:00:00":s); return `${d.getMonth()+1}/${d.getDate()}`; };
function bigSpends(rows){
  const byCat={};
  rows.filter(r=>r.type==="지출"&&!isTransfer(r)).forEach(r=>(byCat[r.category]=byCat[r.category]||[]).push(r));
  const out=[];
  Object.entries(byCat).forEach(([,arr])=>{
    if(arr.length<3) return;                          // 표본이 적으면 '평소'를 신뢰 못함
    const med=_median(arr.map(r=>r.amount)); if(med<=0) return;
    arr.forEach(r=>{ if(r.amount>=med*2.5 && r.amount>=30000) out.push({...r,med,ratio:r.amount/med}); });
  });
  return out.sort((a,b)=>b.ratio-a.ratio).slice(0,8);  // 평소 대비 배수가 큰 순
}

function viewAnalysis(){
  const _anMem = memberFilter!=="전체" ? memberFilter : MEMBERS[0];
  const periods = recentPeriods(AN_PERIODS, _anMem);
  const rowsByPeriod = periods.map(p => myRows().filter(r=>inPeriod(r.date,p)));
  const labels = periods.map(p => p.label.split(" ")[0]);

  // 주기별 수입·지출 합계
  const period = rowsByPeriod.map(rs => ({inc:incOf(rs), exp:expOf(rs)}));
  const incomeByPeriod = period.map(d=>d.inc);

  // 최근(현재) 주기 카테고리별 지출 (도넛)
  const curRows = rowsByPeriod[rowsByPeriod.length-1] || [];
  const curCat = {};
  curRows.filter(r=>r.type!=="입금"&&!isTransfer(r)).forEach(r => curCat[r.category]=(curCat[r.category]||0)+r.amount);
  const curCatArr = Object.entries(curCat).sort((a,b)=>b[1]-a[1]);   // [[cat,amt], ...]
  const totExp = curCatArr.reduce((s,[,a])=>s+a,0);

  // 카테고리 × 주기 지출 매트릭스 → 스택 막대용 (전체합 상위 6 + 나머지 '기타')
  const catByPeriod = {};
  rowsByPeriod.forEach((rs,pi)=>rs.filter(r=>r.type!=="입금"&&!isTransfer(r))
    .forEach(r=>{(catByPeriod[r.category]=catByPeriod[r.category]||Array(periods.length).fill(0))[pi]+=r.amount;}));
  const catTotals = Object.entries(catByPeriod).map(([c,a])=>[c,a.reduce((s,x)=>s+x,0)]).sort((a,b)=>b[1]-a[1]);
  const TOPN=6;
  const stackSeries = catTotals.slice(0,TOPN).map(([c])=>({cat:c,data:catByPeriod[c]}));
  if(catTotals.length>TOPN){
    const etc=Array(periods.length).fill(0);
    catTotals.slice(TOPN).forEach(([c])=>catByPeriod[c].forEach((v,i)=>etc[i]+=v));
    stackSeries.push({cat:"기타",data:etc});
  }

  // 카테고리별 추이 (라인, 현재 지출 상위 5 / 없으면 전체합 상위)
  const topCats = (curCatArr.length ? curCatArr.map(([c])=>c) : catTotals.map(([c])=>c)).slice(0,5);
  const trend = topCats.map(c => ({cat:c, data: rowsByPeriod.map(rs => expOf(rs.filter(r=>r.category===c)))}));

  _anStash = {labels, period, incomeByPeriod, stackSeries, donut:curCatArr, totExp, trend};

  // 요약 스탯
  const avg  = Math.round(period.reduce((s,d)=>s+d.exp,0)/(period.length||1));
  const last = period[period.length-1]?.exp||0, prev = period[period.length-2]?.exp||0, lastInc = period[period.length-1]?.inc||0;
  const trPct  = prev?Math.round((last-prev)/prev*100):0;
  const avgPct = avg?Math.round((last-avg)/avg*100):0;
  const net    = lastInc-last;

  // 반복 지출 (세부내역 기준, 2주기 이상 등장)
  const byMemo={};
  myRows().filter(r=>r.type==="지출"&&r.memo&&!isTransfer(r)).forEach(r=>{
    const pi=periods.findIndex(p=>inPeriod(r.date,p)); if(pi<0) return;
    const k=r.category+"::"+r.memo.replace(/\(.*\)/,"").trim();
    (byMemo[k]=byMemo[k]||{cat:r.category,memo:r.memo,total:0,ps:new Set()});
    byMemo[k].total+=r.amount; byMemo[k].ps.add(pi);
  });
  const rec=Object.values(byMemo).map(x=>({...x,span:x.ps.size})).filter(x=>x.span>=2).sort((a,b)=>b.total-a.total);

  // 일회성 큰 지출 = 개별 거래가 '자기 카테고리 평소(중앙값)'보다 크게 튄 이상치
  const anom = bigSpends(rowsByPeriod.flat());

  const insights = buildInsights(_anMem, periods, rowsByPeriod, curCatArr, totExp);

  // ── HTML ──
  const trChip = p => `<span class="am-d ${p>0?'r':p<0?'g':'f'}">${p>0?'▲':p<0?'▼':'–'}${Math.abs(p)}%</span>`;
  let h=`<div class="sec">`;

  // 1) 메트릭 카드 (지출 / 수입 / 평균 대비)
  h+=`<div class="astat">
    <div class="am"><div class="am-l">이번 주기 지출</div><div class="am-v r">${won(last)}</div>${prev?`<div class="am-sub">${trChip(trPct)} <span style="color:var(--t3)">전 주기</span></div>`:`<div class="am-sub" style="color:var(--t3)">기록 시작</div>`}</div>
    <div class="am"><div class="am-l">이번 주기 수입</div><div class="am-v g">${won(lastInc)}</div><div class="am-sub" style="color:var(--t3)">순 ${net>=0?'+':'-'}${wonShort(Math.abs(net))}</div></div>
    <div class="am"><div class="am-l">평균 대비</div><div class="am-v ${avgPct>0?'r':avgPct<0?'g':''}">${avgPct>=0?'+':''}${avgPct}%</div><div class="am-sub" style="color:var(--t3)">평균 ${wonShort(avg)}</div></div>
  </div>`;

  // 2) 주기별 지출 구성 — 카테고리 스택 막대 + 수입 막대 (한눈에 주기별 카테고리 지출/수입)
  if(catTotals.length || incomeByPeriod.some(v=>v>0)){
    h+=`<div class="panel"><div class="p-t">📊 주기별 지출 구성<span class="p-sub">카테고리별 · 수입</span></div>
      <canvas id="chartPeriod" height="200"></canvas></div>`;
  }

  // 3) 카테고리별 지출 비중 (도넛, 이번 주기)
  if(totExp>0){
    h+=`<div class="panel"><div class="p-t">🍩 카테고리별 지출 비중<span class="p-sub">이번 주기</span></div>
      <div class="donut-wrap"><canvas id="chartDonut" height="220"></canvas>
        <div class="donut-center"><div class="dc-l">총 지출</div><div class="dc-v">${wonShort(totExp)}</div></div></div>
      <div class="dlegend">${curCatArr.map(([c,a])=>`<div class="dlg"><span class="dlg-dot" style="background:${catColor(c)}"></span><span class="dlg-nm">${esc(c)}</span><span class="dlg-v">${Math.round(a/totExp*100)}%</span></div>`).join("")}</div>
    </div>`;
  }

  // 4) 카테고리별 추이 (라인)
  if(trend.length && catTotals.length){
    h+=`<div class="panel"><div class="p-t">📉 카테고리별 지출 추이<span class="p-sub">상위 ${trend.length}개</span></div><canvas id="chartTrend" height="190"></canvas></div>`;
  }

  // 5) 스마트 분석 & 절약 팁
  h+=`<div class="panel"><div class="p-t">💡 스마트 분석 & 절약 팁</div>

  // 7) 일회성 큰 지출 — 자기 카테고리 평소 금액 대비 크게 튄 항목만
  h+=`<div class="panel"><div class="p-t">💥 일회성 큰 지출<span class="p-sub">평소 대비 튄 항목</span></div>${
    anom.length?anom.map(x=>`<div class="anom"><div class="anom-ic">${icon(x.category)}</div>

      <div class="anom-v">${won(x.amount)}</div></div>`).join('')

  return h+`</div>`;
}

/* 카테고리 기반 스마트 분석 — 과지출 진단 + 절약 팁 생성 */
function buildInsights(mem, periods, rowsByPeriod, curCatArr, totExp){
  if(!totExp) return [{ic:"🌱",tone:"good",t:"이번 주기는 아직 지출이 없어요.",b:"지출이 쌓이면 카테고리별 과지출 진단과 절약 팁을 보여드릴게요."}];
  const out=[];
  const curMap = Object.fromEntries(curCatArr);

  // 1) 최대 지출 카테고리 집중도
  const [topCat, topAmt]=curCatArr[0];
  const topPct=Math.round(topAmt/totExp*100);
  out.push({ic:icon(topCat),tone: topPct>=40?"warn":"info",
    t:`가장 큰 지출은 '${topCat}' · 전체의 ${topPct}%`,
    b: topPct>=40
      ? `이번 주기 지출이 '${topCat}'(${won(topAmt)})에 쏠려 있어요. 한 카테고리가 40%를 넘으면 예산이 흔들리기 쉬워요 — 이 항목부터 줄일 여지를 찾아보세요.`
      : `'${topCat}'에 ${won(topAmt)}를 썼어요. 특정 항목에 과하게 몰리지 않은 건강한 분포예요.`});

  // 2) 한도 초과 / 임박 (멤버 한도 기준)
  const lim=(mem&&LIMITS[mem])||{};
  const overs=[], nears=[];
  Object.entries(lim).forEach(([c,l])=>{
    if(!l) return; const used=curMap[c]||0; const pct=Math.round(used/l*100);
    if(pct>=100) overs.push({c,used,l,pct}); else if(pct>=WARN_TH) nears.push({c,pct});
  });
  if(overs.length) out.push({ic:"🚨",tone:"warn",t:`한도 초과 ${overs.length}건`,
    b: overs.map(o=>`'${o.c}' ${o.pct}% (${won(o.used-o.l)} 초과)`).join(" · ")+" — 다음 주기엔 이 카테고리를 가장 먼저 조여보세요."});
  if(nears.length) out.push({ic:"⚠️",tone:"info",t:`한도 임박 ${nears.length}건`,
    b: nears.map(o=>`'${o.c}' ${o.pct}%`).join(" · ")+" — 한도까지 여유가 얼마 없어요."});

  // 3) 평소보다 급증한 카테고리 (이전 주기 평균 대비)
  const prevRows=rowsByPeriod.slice(0,-1).flat();
  const prevCnt=Math.max(periods.length-1,1);
  const prevAvg={};
  prevRows.filter(r=>r.type!=="입금"&&!isTransfer(r)).forEach(r=>prevAvg[r.category]=(prevAvg[r.category]||0)+r.amount);
  Object.keys(prevAvg).forEach(c=>prevAvg[c]/=prevCnt);
  let surge=null;
  curCatArr.forEach(([c,a])=>{
    const base=prevAvg[c]||0;
    if(base>=10000 && a>=base*1.3){ const up=Math.round((a-base)/base*100); if(!surge||up>surge.up) surge={c,up,a,base}; }
  });
  if(surge) out.push({ic:"📈",tone:"warn",t:`'${surge.c}' 지출이 평소보다 ${surge.up}% 늘었어요`,
    b:`평소 약 ${won(Math.round(surge.base))} → 이번 ${won(surge.a)}. 일시적인 지출인지, 새 습관이 생긴 건지 점검해보세요.`});

  // 4) 절약 팁 — 조절 가능한 변동 지출 중 가장 큰 항목
  const flexTop=curCatArr.find(([c])=>!FIXED_CATS.has(c));
  if(flexTop){
    const [c,a]=flexTop; const cut=Math.round(a*0.1/1000)*1000;
    out.push({ic:"💡",tone:"tip",t:`절약은 '${c}'부터 시작하세요`,
      b:`'${c}'는 줄이기 쉬운 변동 지출 중 가장 커요(${won(a)}). 여기서 10%만 아껴도 한 주기에 약 ${won(cut)}, 1년이면 ${won(cut*12)}을 모을 수 있어요.`});
  }

  // 5) 고정 vs 변동 비율
  let fixed=0;
  curCatArr.forEach(([c,a])=>{ if(FIXED_CATS.has(c)) fixed+=a; });
  const flex=totExp-fixed;
  if(fixed>0){
    const fpct=Math.round(fixed/totExp*100);
    out.push({ic:"⚖️",tone:"info",t:`고정 ${fpct}% · 변동 ${100-fpct}%`,
      b: fpct>=60
        ? `고정성 지출 비중이 높아요(${won(fixed)}). 통신·보험·구독은 한 번 줄이면 매 주기 자동으로 절약돼요 — 우선 점검 대상이에요.`
        : `변동 지출이 ${won(flex)}로 더 많아요. 변동 지출은 습관만 바꿔도 가장 빠르게 줄일 수 있는 영역이에요.`});
  }

  return out;
}

let _charts=[];
function destroyCharts(){ _charts.forEach(c=>{try{c.destroy();}catch(e){}}); _charts=[]; }
function drawAnalysisCharts(){

        scales:{
          x:{ticks:{color:tickC,font:{size:11}},grid:{display:false},stacked:true},
          yExp:{position:"left",stacked:true,beginAtZero:true,ticks:{color:subC,font:{size:10},callback:v=>wonShort(v)},grid:{color:gridC},title:{display:true,text:"지출(왼쪽 막대)",color:subC,font:{size:9}}},
          yInc:{position:"right",beginAtZero:true,ticks:{color:"#2EC890",font:{size:10},callback:v=>wonShort(v)},grid:{display:false},title:{display:true,text:"수입(오른쪽 막대)",color:"#2EC890",font:{size:9}}}

  // 도넛: 카테고리별 지출 비중
  const dc=document.getElementById("chartDonut");
  if(dc && _anStash.donut.length){
    const labels=_anStash.donut.map(([c])=>c), data=_anStash.donut.map(([,a])=>a);
    _charts.push(new Chart(dc,{type:"doughnut",data:{labels,datasets:[{data,backgroundColor:labels.map(catColor),borderColor:"#0E1020",borderWidth:2,hoverOffset:6}]},
      options:{responsive:true,cutout:"64%",plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${won(ctx.parsed)} (${Math.round(ctx.parsed/_anStash.totExp*100)}%)`}}}}}));
  }

  // 라인: 카테고리별 추이
  const tc=document.getElementById("chartTrend");
  if(tc && _anStash.trend.length){
    _charts.push(new Chart(tc,{type:"line",data:{labels:_anStash.labels,datasets:_anStash.trend.map(t=>({
      label:t.cat,data:t.data,borderColor:catColor(t.cat),backgroundColor:catColor(t.cat),tension:.35,borderWidth:2,pointRadius:3,pointHoverRadius:5,fill:false}))},
      options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{labels:{color:tickC,font:{size:10},boxWidth:8,padding:8}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${won(ctx.parsed.y)}`}}},scales:axes}}));
  }
}

/* ── 계좌 탭 (멤버 필터 적용) ── */
function viewAccount(){
  const rows = memberFilter==="전체" ? ROWS : ROWS.filter(r=>r.member===memberFilter);
  // 잔액(acct)엔 이동 포함(계좌 간 돈 흐름), 총 수입·지출 표시엔 이동 제외(같은 금액이 양쪽에 잡혀 부풀어 보임)
  let inc=0, exp=0, bal=0, acct={};
  rows.forEach(r=>{
    const a=r.account||"미분류";
    if(r.type==="입금"){ if(!isTransfer(r))inc+=r.amount; bal+=r.amount; acct[a]=(acct[a]||0)+r.amount; }
    else{ if(!isTransfer(r))exp+=r.amount; bal-=r.amount; acct[a]=(acct[a]||0)-r.amount; }
  });
  let h=`${memberFilterPills()}<div class="sec">
    <div class="acct-tot"><div class="at-l">${memberFilter==="전체"?"전체 합산 잔액":esc(memberFilter)+"의 잔액"}</div><div class="at-v">${won(bal)}</div></div>
    <div class="acct-grid">
      <div class="am"><div class="am-l">총 수입</div><div class="am-v g">+${won(inc)}</div><div class="a-sub">계좌간 이동 제외</div></div>
      <div class="am"><div class="am-l">총 지출</div><div class="am-v r">-${won(exp)}</div><div class="a-sub">계좌간 이동 제외</div></div>
    </div>
    <div class="sec-t">계좌별 잔액</div>`;
  if(Object.keys(acct).length){
    Object.entries(acct).forEach(([nm,b])=>h+=`<div class="acard"><div><div class="a-nm">🏦 ${esc(nm)}</div><div class="a-sub">잔액</div></div><div class="a-bal ${b>=0?'g':'r'}">${b>=0?'+':''}${won(b)}</div></div>`);
  } else {
    h+=empty("🏦","계좌 데이터가 없어요.");
  }
  return h+`</div>`;
}

  document.getElementById("tgInc").className="tg"+(t==="입금"?" tg-i":"");
  document.getElementById("tgTrf").className="tg"+(t==="이동"?" tg-t":"");
  const trf = t==="이동";  // 계좌간 이동: 카테고리·결제수단·계좌 숨기고 출금/입금계좌 노출
  document.getElementById("rowCategory").style.display = trf?"none":"";
  document.getElementById("rowMethod").style.display   = trf?"none":"";
  document.getElementById("rowAccount").style.display  = trf?"none":"";
  document.getElementById("rowFrom").style.display     = trf?"":"none";
  document.getElementById("rowTo").style.display       = trf?"":"none";
}
function openSheet(){
  if(!MEMBERS.length){ toast("설정에서 멤버를 먼저 추가해주세요"); return; }
  editId=null;
  document.getElementById("sheetTitle").textContent="내역 추가";
  document.getElementById("saveBtn").textContent="저장하기";
  document.getElementById("fMemo").value="";
  const t=new Date();
  document.getElementById("fDate").value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
  document.getElementById("fAmount").value="";
  document.getElementById("tgTrf").style.display="";  // 신규 입력에서만 이동 허용
  setType("지출");
  memberVal=memberVal||defMember();
  renderMemberSeg();
  refreshCatList();
  document.getElementById("overlay").classList.add("open");
  document.body.classList.add("sheet-open");
}
function editEntry(id){
  // id로 ROWS에서 조회 — 행 JSON을 onclick 속성에 인라인하면 메모의 따옴표에 깨짐
  const r=ROWS.find(x=>x.id===id); if(!r) return;
  // 계좌간 이동은 2건이 한 쌍 → 단건 수정 시 짝과 어긋나므로 막음(삭제 후 재등록 유도)
  if(isTransfer(r)){ toast("계좌간 이동은 수정할 수 없어요. 삭제 후 다시 추가해주세요"); return; }
  editId=r.id;
  document.getElementById("sheetTitle").textContent="내역 수정";
  document.getElementById("saveBtn").textContent="수정하기";
  document.getElementById("tgTrf").style.display="none";  // 수정 시엔 이동 불가(단건 수정)
  setType(r.type);
  memberVal=r.member||MEMBERS[0];
  renderMemberSeg();
  refreshCatList();
  document.getElementById("fDate").value=r.date;
  document.getElementById("fAmount").value=Number(r.amount).toLocaleString("ko-KR");
  document.getElementById("fCategory").value=r.category;
  document.getElementById("fMethod").value=r.method||"";
  document.getElementById("fAccount").value=r.account||"";
  updateSelBtn("fCategory"); updateSelBtn("fMethod"); updateSelBtn("fAccount");
  document.getElementById("fMemo").value=r.memo||"";
  document.getElementById("overlay").classList.add("open");
  document.body.classList.add("sheet-open");
}
function closeSheet(){ document.getElementById("overlay").classList.remove("open"); document.body.classList.remove("sheet-open"); editId=null; }
document.getElementById("fAmount").addEventListener("input",e=>{
  const r=e.target.value.replace(/[^0-9]/g,"");
  e.target.value=r?Number(r).toLocaleString("ko-KR"):"";
});

/* ── 커스텀 피커 ── */
let pickerSel = null;
function openPicker(selId, title){
  pickerSel = selId;
  const sel = document.getElementById(selId);
  const opts = Array.from(sel.options);
  document.getElementById("pickerTitle").textContent = title;
  if(!opts.length){
    document.getElementById("pickerOpts").innerHTML = '<div style="padding:24px 20px;text-align:center;color:var(--t3);font-size:.85rem">항목이 없어요. 설정에서 추가해주세요.</div>';
  } else {
    document.getElementById("pickerOpts").innerHTML = opts.map((o,i)=>
      `<div class="picker-opt${sel.value===o.value?' on':''}" onclick="pickOptIdx(${i})">${esc(o.text)}</div>`
    ).join("");
  }
  document.getElementById("overlay").style.overflow = "hidden";  // 배경(입력 시트) 스크롤 잠금
  document.getElementById("pickerOv").classList.add("open");
}
function pickOptIdx(idx){
  if(!pickerSel) return;
  const sel = document.getElementById(pickerSel);
  sel.selectedIndex = idx;
  updateSelBtn(pickerSel);
  closePicker();
}
function closePicker(){
  document.getElementById("pickerOv").classList.remove("open");
  document.getElementById("overlay").style.overflow = "";  // 배경 스크롤 잠금 해제
  pickerSel = null; iconCat = null;
}
function updateSelBtn(selId){
  const sel = document.getElementById(selId);
  const disp = document.getElementById(selId+"Disp");
  if(!sel||!disp) return;
  const opt = sel.options[sel.selectedIndex];
  disp.textContent = opt ? opt.text : "선택";
}
</script>
