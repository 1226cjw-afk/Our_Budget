<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#07080E;
  --bg2:#0C0E18;
  --bg3:#12141F;
  --card:#0E1020;
  --bd:#18192E;
  --bd2:#252742;
  --ac:#C9933A;
  --ac2:#A06F1E;
  --acg:rgba(201,147,58,.13);
  --acg2:rgba(201,147,58,.06);
  --g:#2EC890;
  --gb:rgba(46,200,144,.10);
  --r:#F05470;
  --rb:rgba(240,84,112,.10);
  --amber:#E8961E;
  --amberg:rgba(232,150,30,.10);
  --t1:#EDE8F8;
  --t2:#6E6C8A;
  --t3:#32304E;
  --shadow:0 10px 48px rgba(0,0,0,.7);
  --glow:0 0 40px rgba(201,147,58,.14);
}

html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:'Pretendard','Noto Sans KR',-apple-system,sans-serif;
  background:var(--bg);color:var(--t1);
  line-height:1.6;-webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 500px 350px at 100% 0%, rgba(201,147,58,.08) 0%, transparent 65%),
    radial-gradient(ellipse 300px 400px at 0% 100%, rgba(46,200,144,.035) 0%, transparent 60%);
}

.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:116px;z-index:1}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* ── 헤더 ── */
.hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 20px 13px;
  background:rgba(7,8,14,.9);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-bottom:1px solid rgba(201,147,58,.12);
  position:sticky;top:0;z-index:20;
}
.hd-l{display:flex;align-items:center;gap:12px}
.logo-s{
  width:40px;height:40px;
  background:linear-gradient(140deg,#B8792A,#E0AD50);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 4px 20px rgba(201,147,58,.38),0 1px 3px rgba(0,0,0,.4);
  position:relative;overflow:hidden;flex-shrink:0;
}
.logo-s::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(140deg,rgba(255,255,255,.18) 0%,transparent 55%);
}
.hd-t{
  font-size:1.05rem;font-weight:900;letter-spacing:-.5px;
  background:linear-gradient(120deg,#EDD598 0%,#C9933A 60%,#E8AA55 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── 네비 ── */
.nav{
  display:flex;
  background:rgba(7,8,14,.88);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-bottom:1px solid var(--bd);
  position:sticky;top:68px;z-index:19;
  padding:0 4px;
}
.tab{
  flex:1;padding:9px 2px 11px;
  font-size:.67rem;font-weight:700;color:var(--t3);
  border-bottom:2px solid transparent;
  transition:color .18s,border-color .18s;
  letter-spacing:.1px;
}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.tab-ic{display:block;font-size:1.15rem;margin-bottom:3px}

/* ── 필터 ── */
.filter{display:flex;gap:6px;padding:14px 16px 0;overflow-x:auto;scrollbar-width:none}
.filter::-webkit-scrollbar{display:none}
.pill{
  flex-shrink:0;padding:6px 15px;border-radius:20px;
  font-size:.76rem;font-weight:700;
  border:1px solid var(--bd2);color:var(--t2);background:var(--bg2);
  white-space:nowrap;transition:all .18s;
}
.pill.on{background:var(--acg);border-color:rgba(201,147,58,.45);color:var(--ac)}
.sec{padding:14px 16px 0}
.g{color:var(--g)}.r{color:var(--r)}

/* ── 요약 카드 ── */
.cards{display:flex;gap:10px;margin-bottom:16px}
.card{
  flex:1;border-radius:22px;padding:18px 16px;
  border:1px solid var(--bd);background:var(--card);
}
.card.inc{
  background:linear-gradient(150deg,rgba(46,200,144,.09) 0%,var(--card) 70%);
  border-color:rgba(46,200,144,.2);
}
.card.exp{
  background:linear-gradient(150deg,rgba(240,84,112,.09) 0%,var(--card) 70%);
  border-color:rgba(240,84,112,.2);
}
.c-lb{font-size:.62rem;font-weight:700;color:var(--t3);margin-bottom:8px;letter-spacing:.9px;text-transform:uppercase}
.c-v{font-size:1.1rem;font-weight:900;letter-spacing:-.7px}

/* ── 날짜 그룹 / 내역 아이템 ── */
.dgroup{margin-bottom:4px}
.dhead{
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 2px 8px;
  font-size:.8rem;font-weight:700;color:var(--t2);
}
.dtot{font-size:.78rem;color:var(--t3);font-weight:600}
.item{
  background:var(--card);
  border:1px solid var(--bd);
  border-radius:20px;
  padding:14px 14px;
  margin-bottom:8px;
  display:flex;gap:12px;
  transition:border-color .2s,transform .2s,box-shadow .2s;
  will-change:transform;
}
.item:active{transform:scale(.99)}
.i-ic{
  width:46px;height:46px;min-width:46px;
  border-radius:13px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:1.28rem;
  border:1px solid var(--bd);
}
.i-bd{flex:1;min-width:0}
.i-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:7px;align-items:flex-start}
.i-cat{font-size:.93rem;font-weight:700;line-height:1.3}
.i-amt{font-size:.98rem;font-weight:900;white-space:nowrap;letter-spacing:-.5px}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{
  font-size:.7rem;color:var(--t3);background:var(--bg3);
  padding:3px 9px;border-radius:6px;font-weight:500;
  border:1px solid var(--bd);
}
.chip.mem{
  background:var(--acg);color:var(--ac);font-weight:700;
  border:1px solid rgba(201,147,58,.22);
}
.i-memo{font-size:.79rem;color:var(--t2);margin-top:6px;line-height:1.55}
.i-act{display:flex;gap:6px;margin-top:10px}
.b-edit,.b-del{padding:5px 13px;font-size:.75rem;font-weight:700;border-radius:9px;border:1px solid;transition:all .15s}
.b-edit{border-color:rgba(201,147,58,.22);color:var(--ac);background:rgba(201,147,58,.07)}
.b-edit:hover{background:var(--acg)}
.b-del{border-color:rgba(240,84,112,.22);color:var(--r);background:rgba(240,84,112,.07)}
.b-del:hover{background:var(--rb)}

/* ── 분류 카드 ── */
.ccard{
  background:var(--card);border:1px solid var(--bd);border-radius:20px;
  padding:16px;margin-bottom:10px;transition:border-color .2s;
}
.c-h{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px}
.c-l{display:flex;align-items:center;gap:10px;min-width:0}
.c-ic{
  width:42px;height:42px;min-width:42px;
  border-radius:12px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  border:1px solid var(--bd);
}
.c-nm{font-size:.92rem;font-weight:700}
.c-bd{font-size:.76rem;font-weight:700;padding:5px 12px;border-radius:9px;white-space:nowrap}
.bg{background:var(--gb);color:var(--g)}.br{background:var(--rb);color:var(--r)}
.c-st{display:flex;gap:8px;margin-bottom:11px}
.st{flex:1;background:var(--bg3);border-radius:11px;padding:10px 12px;border:1px solid var(--bd)}
.st-l{font-size:.6rem;font-weight:700;color:var(--t3);margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.st-v{font-size:.84rem;font-weight:700}
.barw{height:4px;background:var(--bg3);border-radius:2px}
.bar{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--ac2),var(--ac));transition:width .4s}
.sec-t{font-size:.66rem;font-weight:700;color:var(--t3);letter-spacing:.9px;text-transform:uppercase;padding:16px 2px 8px}

/* ── 한도 ── */
.alert{
  background:rgba(240,84,112,.07);border:1px solid rgba(240,84,112,.22);
  color:var(--r);border-radius:14px;padding:12px 16px;
  font-size:.84rem;font-weight:700;margin-bottom:12px;
}
.lcard{
  background:var(--card);border:1px solid var(--bd);
  border-radius:20px;padding:16px;margin-bottom:10px;
}
.lcard.over{
  border-color:rgba(240,84,112,.35);
  background:linear-gradient(150deg,rgba(240,84,112,.06),var(--card));
}
.lcard.warn{
  border-color:rgba(232,150,30,.3);
  background:linear-gradient(150deg,rgba(232,150,30,.05),var(--card));
}
.l-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.l-pct{font-size:1.04rem;font-weight:900}
.l-pct.ok{color:var(--ac)}.l-pct.warn{color:var(--amber)}.l-pct.over{color:var(--r)}
.l-bar-w{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:10px}
.l-bar{height:6px;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.l-bar.ok{background:linear-gradient(90deg,var(--ac2),var(--ac))}
.l-bar.warn{background:linear-gradient(90deg,#b07010,var(--amber))}
.l-bar.over{background:linear-gradient(90deg,#b01035,var(--r))}
.l-meta{display:flex;gap:8px;font-size:.82rem;font-weight:700;align-items:center}
.l-lim{color:var(--t3);font-weight:500}
.l-msg{margin-top:6px;font-size:.76rem;font-weight:700;color:var(--r)}
.l-msg.warn{color:var(--amber)}
.l-edit{margin-top:12px;display:flex;gap:8px}
.l-edit input{
  flex:1;padding:9px 13px;border:1px solid var(--bd);border-radius:10px;
  background:var(--bg2);color:var(--t1);font-family:inherit;font-size:.84rem;
  outline:none;transition:border-color .18s;
}
.l-edit input:focus{border-color:var(--ac)}
.l-edit button{
  padding:9px 16px;border-radius:10px;background:var(--acg);color:var(--ac);
  font-weight:700;font-size:.78rem;border:1px solid rgba(201,147,58,.22);transition:all .15s;
}
.l-edit button:hover{background:rgba(201,147,58,.2)}

/* ── 분석 ── */
.panel{
  background:var(--card);border:1px solid var(--bd);
  border-radius:20px;padding:18px;margin-bottom:12px;
}
.p-t{font-size:.9rem;font-weight:700;margin-bottom:14px}
.p-body{font-size:.83rem;line-height:2;color:var(--t2);white-space:pre-line}
.arow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)}
.arow:last-child{border:none}
.a-mo{flex:1;font-size:.83rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.a-tag{font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:8px}
.a-tag.rec{background:var(--acg);color:var(--ac);border:1px solid rgba(201,147,58,.2)}
.a-tag.one{background:var(--gb);color:var(--g);border:1px solid rgba(46,200,144,.18)}
.a-v{font-size:.83rem;font-weight:700;white-space:nowrap}

/* ── 계좌 ── */
.acct-tot{
  border-radius:24px;padding:24px 22px 22px;margin-bottom:14px;
  background:linear-gradient(145deg,#8A5A12 0%,#C9933A 45%,#E8B85A 100%);
  box-shadow:0 12px 48px rgba(201,147,58,.32),0 2px 10px rgba(0,0,0,.45);
  position:relative;overflow:hidden;
}
.acct-tot::before{
  content:'';position:absolute;top:-50px;right:-50px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.07);pointer-events:none;
}
.acct-tot::after{
  content:'₩';position:absolute;bottom:-14px;left:18px;
  font-size:6rem;font-weight:900;color:rgba(0,0,0,.06);
  line-height:1;pointer-events:none;letter-spacing:-4px;
}
.at-l{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.6);margin-bottom:8px;letter-spacing:.8px;text-transform:uppercase}
.at-v{font-size:2rem;font-weight:900;color:#fff;letter-spacing:-1.5px;text-shadow:0 2px 8px rgba(0,0,0,.18);position:relative;z-index:1}
.acct-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.am{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:14px}
.am-l{font-size:.66rem;font-weight:700;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.am-v{font-size:.98rem;font-weight:700;letter-spacing:-.3px}
.acard{
  background:var(--card);border:1px solid var(--bd);border-radius:16px;
  padding:14px 16px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;
  transition:border-color .2s;
}
.a-nm{font-size:.9rem;font-weight:700}
.a-sub{font-size:.7rem;color:var(--t3);margin-top:2px}
.a-bal{font-size:.95rem;font-weight:700;letter-spacing:-.3px}

/* ── FAB ── */
.fab{
  position:fixed;bottom:28px;
  right:calc(50% - 240px + 20px);
  width:54px;height:54px;
  background:linear-gradient(140deg,#A06F1E,#D4A030);
  color:#fff;border-radius:16px;font-size:1.55rem;
  box-shadow:0 8px 36px rgba(201,147,58,.50),0 2px 6px rgba(0,0,0,.35);
  z-index:30;display:flex;align-items:center;justify-content:center;
  transition:transform .18s,box-shadow .18s;
}
.fab:active{transform:scale(.92);box-shadow:0 4px 20px rgba(201,147,58,.4)}
@media(max-width:480px){.fab{right:20px}}

.toast{
  position:fixed;bottom:110px;left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--bd2);
  padding:10px 22px;border-radius:26px;
  font-size:.8rem;font-weight:700;
  z-index:40;opacity:0;transition:opacity .22s;
  pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 36px rgba(0,0,0,.55);
}
.toast.show{opacity:1}

.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.e-ic{font-size:2.4rem;margin-bottom:12px;opacity:.45}
.empty p{font-size:.84rem;line-height:2}

.spin{
  width:26px;height:26px;
  border:2px solid var(--bd2);border-top-color:var(--ac);
  border-radius:50%;animation:sp .75s linear infinite;margin:72px auto;
}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── 오버레이 / 시트 ── */
.overlay{display:none;position:fixed;inset:0;z-index:50;background:var(--bg);overflow-y:auto}
.overlay.open{display:block}
.sheet{max-width:480px;margin:0 auto;min-height:100vh}
.s-top{
  display:flex;justify-content:space-between;align-items:center;
  padding:17px 20px;
  background:rgba(7,8,14,.95);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-bottom:1px solid var(--bd);position:sticky;top:0;
}
.s-t{font-size:1rem;font-weight:900;letter-spacing:-.3px}
.s-x{
  background:var(--bg3);border:1px solid var(--bd);border-radius:20px;
  color:var(--t2);font-size:.79rem;font-weight:700;padding:7px 15px;
  transition:all .18s;
}
.s-x:hover{border-color:var(--bd2);color:var(--t1)}
.s-bd{padding:22px 18px 56px}

.frow{margin-bottom:17px}
.flb{
  font-size:.65rem;font-weight:700;color:var(--t3);
  letter-spacing:.8px;text-transform:uppercase;
  margin-bottom:9px;display:block;
}
.inp{
  width:100%;padding:13px 15px;
  border:1px solid var(--bd2);border-radius:13px;
  font-size:.92rem;font-family:inherit;color:var(--t1);
  background:var(--bg2);outline:none;appearance:none;
  transition:border-color .18s,box-shadow .18s;
}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(201,147,58,.1)}
.inp option{background:var(--bg2)}

.toggle{display:flex;gap:8px}
.tg{
  flex:1;padding:13px;border:1px solid var(--bd2);border-radius:13px;
  font-size:.92rem;font-weight:700;background:var(--bg2);color:var(--t2);
  transition:all .18s;
}
.tg.tg-e{background:rgba(240,84,112,.1);border-color:rgba(240,84,112,.38);color:var(--r)}
.tg.tg-i{background:rgba(46,200,144,.1);border-color:rgba(46,200,144,.38);color:var(--g)}

.seg{display:flex;gap:8px;flex-wrap:wrap}
.seg button{
  flex:1;min-width:80px;padding:12px;
  border:1px solid var(--bd2);border-radius:12px;
  font-weight:700;background:var(--bg2);color:var(--t2);transition:all .18s;
  font-size:.9rem;
}
.seg button.on{background:var(--acg);border-color:rgba(201,147,58,.45);color:var(--ac)}

.submit{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#8A5A12,#C9933A);
  color:#FFF8E8;border-radius:14px;font-size:.98rem;font-weight:900;margin-top:8px;
  box-shadow:0 6px 28px rgba(201,147,58,.38);transition:all .18s;
  letter-spacing:.2px;
}
.submit:active{transform:translateY(1px);box-shadow:0 3px 14px rgba(201,147,58,.25)}
.submit:disabled{opacity:.6;cursor:not-allowed}

/* ── 마스터 데이터 관리 ── */
.m-section{
  background:var(--card);border:1px solid var(--bd);border-radius:20px;
  padding:16px;margin-bottom:12px;
}
.m-title{font-size:.88rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--t1)}
.m-list{margin-bottom:14px}
.m-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 2px;border-bottom:1px solid var(--bd);
}
.m-item:last-child{border:none}
.m-nm{font-size:.87rem;color:var(--t1)}
.m-del{
  color:var(--r);font-size:.72rem;font-weight:700;
  padding:4px 11px;background:var(--rb);
  border-radius:8px;border:1px solid rgba(240,84,112,.18);transition:all .15s;
}
.m-del:hover{background:rgba(240,84,112,.18)}
.m-empty{font-size:.8rem;color:var(--t3);padding:10px 0;text-align:center}
.m-add{display:flex;gap:8px}
.m-add input{
  flex:1;padding:10px 13px;border:1px solid var(--bd2);border-radius:11px;
  background:var(--bg2);color:var(--t1);font-family:inherit;font-size:.85rem;
  outline:none;transition:border-color .18s;
}
.m-add input:focus{border-color:var(--ac)}
.m-add button{
  padding:10px 16px;border-radius:11px;background:var(--acg);color:var(--ac);
  font-weight:700;font-size:.82rem;border:1px solid rgba(201,147,58,.22);
  transition:all .15s;white-space:nowrap;
}
.m-add button:hover{background:rgba(201,147,58,.2)}

/* ── 에러 카드 ── */
.err-card{
  background:rgba(240,84,112,.06);border:1px solid rgba(240,84,112,.22);
  border-radius:18px;padding:20px 18px;margin-top:16px;
}

/* ── 커스텀 셀렉트 ── */
.sel-btn{
  width:100%;padding:13px 15px;
  border:1px solid var(--bd2);border-radius:13px;
  font-size:.92rem;font-family:inherit;color:var(--t1);
  background:var(--bg2);text-align:left;
  display:flex;justify-content:space-between;align-items:center;
  transition:border-color .18s,box-shadow .18s;
}
.sel-btn:active{border-color:var(--ac);box-shadow:0 0 0 3px rgba(201,147,58,.1)}
.sel-arr{color:var(--t3);font-size:.85rem;flex-shrink:0;margin-left:8px}
.picker-ov{
  display:none;position:fixed;inset:0;z-index:60;
  background:rgba(0,0,0,.55);
}
.picker-ov.open{display:flex;align-items:flex-end;justify-content:center}
.picker-sht{
  width:100%;max-width:480px;
  background:var(--bg2);border-radius:24px 24px 0 0;
  border:1px solid var(--bd2);border-bottom:none;
  max-height:65vh;display:flex;flex-direction:column;overflow:hidden;
}
.picker-hd{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;
}
.picker-t{font-size:.95rem;font-weight:900}
.picker-cl{
  background:var(--bg3);border:1px solid var(--bd);border-radius:20px;
  color:var(--t2);font-size:.79rem;font-weight:700;padding:7px 15px;
}
.picker-opts{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 0}
.picker-opt{
  padding:15px 22px;font-size:.93rem;font-weight:600;color:var(--t1);
  border-bottom:1px solid var(--bd);transition:background .12s;
}
.picker-opt:last-child{border:none;padding-bottom:max(15px,env(safe-area-inset-bottom,15px))}
.picker-opt.on{color:var(--ac);background:var(--acg2)}
.picker-opt:active{background:var(--bg3)}
</style>
</head>
<body>

<div class="app" id="appView">
  <header class="hd">
    <div class="hd-l">
      <div class="logo-s">💰</div>
      <div class="hd-t">우리집 가계부</div>
    </div>
  </header>
  <nav class="nav" id="nav"></nav>
  <main id="main"><div class="spin"></div></main>
  <button class="fab" onclick="openSheet()">＋</button>
</div>

<div class="toast" id="toast"></div>

<div class="picker-ov" id="pickerOv" onclick="closePicker()">
  <div class="picker-sht" onclick="event.stopPropagation()">
    <div class="picker-hd">
      <span class="picker-t" id="pickerTitle">선택</span>
      <button class="picker-cl" onclick="closePicker()">닫기</button>
    </div>
    <div class="picker-opts" id="pickerOpts"></div>
  </div>
</div>

<div class="picker-ov" id="duOv" onclick="closeDeviceUser()">
  <div class="picker-sht" onclick="event.stopPropagation()">
    <div class="picker-hd">
      <span class="picker-t">이 기기는 누구의 폰인가요?</span>
      <button class="picker-cl" onclick="closeDeviceUser()">나중에</button>
    </div>
    <div style="padding:12px 22px 4px;font-size:.78rem;color:var(--t2);line-height:1.7">
      선택하면 이 기기에서 <b style="color:var(--ac)">입력·필터의 기본 사용자</b>가 그 사람으로 맞춰집니다. (설정 탭에서 언제든 변경)
    </div>
    <div class="picker-opts" id="duOpts"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="s-top">
      <div class="s-t" id="sheetTitle">내역 추가</div>
      <button class="s-x" onclick="closeSheet()">취소</button>
    </div>
    <div class="s-bd">
      <div class="frow">
        <label class="flb">구분</label>
        <div class="toggle">
          <button class="tg tg-e" id="tgExp" onclick="setType('지출')">지출</button>
          <button class="tg" id="tgInc" onclick="setType('입금')">입금</button>
        </div>
      </div>
      <div class="frow"><label class="flb">누가</label><div class="seg" id="memberSeg"></div></div>
      <div class="frow"><label class="flb">날짜</label><input class="inp" type="date" id="fDate"></div>
      <div class="frow"><label class="flb">금액</label><input class="inp" id="fAmount" inputmode="numeric" placeholder="0"></div>
      <div class="frow"><label class="flb">카테고리</label>
        <button type="button" class="sel-btn" onclick="openPicker('fCategory','카테고리')">
          <span id="fCategoryDisp">선택</span><span class="sel-arr">▾</span>
        </button>
        <select id="fCategory" style="display:none"></select>
      </div>
      <div class="frow"><label class="flb">결제수단</label>
        <button type="button" class="sel-btn" onclick="openPicker('fMethod','결제수단')">
          <span id="fMethodDisp">선택 안함</span><span class="sel-arr">▾</span>
        </button>
        <select id="fMethod" style="display:none"></select>
      </div>
      <div class="frow"><label class="flb">계좌</label>
        <button type="button" class="sel-btn" onclick="openPicker('fAccount','계좌')">
          <span id="fAccountDisp">계좌 선택</span><span class="sel-arr">▾</span>
        </button>
        <select id="fAccount" style="display:none"></select>
      </div>
      <div class="frow"><label class="flb">세부내역</label><input class="inp" id="fMemo" placeholder="메모 (선택)"></div>
      <button class="submit" id="saveBtn" onclick="saveEntry()">저장하기</button>
    </div>
  </div>
</div>

<script>
/* ── 상수 ── */
const DEFAULT_CATS = ["식비","생활비","교통","의료","쇼핑","문화","교육","통신","보험","고정비","데이트","월급","이자","기타"];
const MASTER_KEYS  = {categories:"카테고리", methods:"결제수단", accounts:"계좌"};
const MASTER_TYPE  = {categories:"category", methods:"method", accounts:"account"};  // JS key → DB type
const MASTER_KEY_OF= {category:"categories", method:"methods", account:"accounts"};   // DB type → JS key
const DEVICE_USER_KEY = "ourbudget.deviceUser";  // localStorage: 이 기기의 기본 사용자
// 구글 시트 백업 (Apps Script 웹앱). URL 비우면 백업 비활성.
const GAS_BACKUP_URL    = "https://script.google.com/macros/s/AKfycbzqw_wcewp6Bm50VR1Rw85hLT8JOYaSMbV68iEOBKmRLIhHUSc-HWlIO7c7ylkElzkw/exec";  // Apps Script 웹앱
const GAS_BACKUP_SECRET = "ourbudget-backup-2026";  // GAS 코드의 SECRET과 동일하게
const CAT_ICON     = {생활비:"🛒",고정비:"🏠",월급:"💵",이자:"📈",데이트:"❤️",식비:"🍽️",교통:"🚌",의료:"💊",쇼핑:"👜",문화:"🎬",교육:"📚",통신:"📱",보험:"🛡️",기타:"📌"};
const TABS         = [["list","📋","내역"],["cat","📊","분류"],["limit","🎯","한도"],["analysis","📈","분석"],["acct","🏦","계좌"],["master","⚙️","설정"]];

/* ── 상태 ── */
let sb;
let MEMBERS       = [];     // DB에서 동적 로드
let ROWS          = [];
let LIMITS        = {};     // {멤버: {카테고리: 금액}}
let MASTER        = {};     // {멤버: {categories, methods, accounts}}
let BILLING_STARTS = {};    // {멤버: 시작일} — app_settings에서 로드
let DEVICE_USER    = null;  // 이 기기의 기본 사용자 (localStorage)

let tab          = "list";
let scope        = "current";
let memberFilter = "전체";  // 내역·분류·계좌 탭 공통 필터
let limitMember  = null;    // 한도 탭 전용
let masterMember = null;    // 설정 탭 전용
let typeVal      = "지출";
let memberVal    = null;    // 입력 시트
let editId       = null;
let loadError    = null;

/* ── 유틸 ── */
const won      = n => Number(n||0).toLocaleString("ko-KR")+"원";
const wonShort = n => n>=10000 ? (n/10000).toFixed(n%10000?1:0)+"만" : Number(n).toLocaleString("ko-KR");
const icon     = c => CAT_ICON[c] || "💳";
const toast    = m => { const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1800); };
const empty    = (ic,msg) => `<div class="empty"><div class="e-ic">${ic}</div><p>${msg.replace(/\n/g,"<br>")}</p></div>`;
// 기기 기본 사용자가 멤버 목록에 있으면 그 사람을, 없으면 첫 멤버를 기본값으로
const defMember = () => (DEVICE_USER && MEMBERS.includes(DEVICE_USER)) ? DEVICE_USER : (MEMBERS[0]||null);

/* ── 결제 주기 ── */
function billingPeriod(member, ref){
  const sd=(member&&BILLING_STARTS[member])||25;
  ref=ref||new Date(); const d=ref.getDate(),m=ref.getMonth(),y=ref.getFullYear();
  const ed=sd>1?sd-1:new Date(y,m+1,0).getDate();
  let sy,sm,ey,em;
  if(d>=sd){sy=y;sm=m;ey=m===11?y+1:y;em=m===11?0:m+1;}
  else{sy=m===0?y-1:y;sm=m===0?11:m-1;ey=y;em=m;}
  return {start:new Date(sy,sm,sd),end:new Date(ey,em,ed,23,59,59),label:`${sm+1}/${sd} ~ ${em+1}/${ed}`,key:`${sy}-${String(sm+1).padStart(2,"0")}`};
}
function recentPeriods(n, member){
  member=member||MEMBERS[0];
  const sd=(member&&BILLING_STARTS[member])||25;
  const cur=billingPeriod(member);
  return Array.from({length:n},(_,i)=>billingPeriod(member,new Date(cur.start.getFullYear(),cur.start.getMonth()-(n-1-i),sd)));
}
const inPeriod = (s,p) => { const d=new Date(s.length===10?s+"T12:00:00":s); return d>=p.start&&d<=p.end; };

/* ── 초기화 ── */
window.onload = async () => {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  try { DEVICE_USER = localStorage.getItem(DEVICE_USER_KEY) || null; } catch(e){ DEVICE_USER = null; }
  buildNav();
  try { await loadAll(); } catch(e) { loadError=e.message; console.error("초기화 오류:",e); }
  // 기기 사용자가 멤버에 없으면(삭제·개명) 무효화
  if(DEVICE_USER && !MEMBERS.includes(DEVICE_USER)){ DEVICE_USER=null; try{localStorage.removeItem(DEVICE_USER_KEY);}catch(e){} }
  // 기기 사용자가 정해져 있으면 각 필터의 기본값을 그 사람으로
  if(DEVICE_USER) memberFilter = DEVICE_USER;
  renderMemberSeg();
  render();
  // 최초 1회: 이 기기의 사용자를 아직 안 정했으면 선택 모달
  if(!DEVICE_USER && MEMBERS.length && !loadError) openDeviceUser();
};

/* ── 데이터 로드 ── */
async function loadAll(){
  loadError = null;
  const [mem, tx, lim, mst, cfg] = await Promise.all([
    sb.from("members").select("name").order("id"),
    sb.from("transactions").select("*").order("date",{ascending:false}),
    sb.from("category_limits").select("*"),
    sb.from("master_data").select("*"),
    sb.from("app_settings").select("*")
  ]);

  if(mem.error) throw new Error("멤버 로드 오류: "+mem.error.message);
  MEMBERS = (mem.data||[]).map(m=>m.name);

  // 탭별 선택 멤버를 MEMBERS 목록에 맞게 보정 (기기 사용자 우선)
  if(!MEMBERS.includes(limitMember))  limitMember  = defMember();
  if(!MEMBERS.includes(masterMember)) masterMember = defMember();
  if(!MEMBERS.includes(memberVal))    memberVal    = defMember();

  if(tx.error) throw new Error(tx.error.message||"거래내역 로드 오류");
  ROWS = tx.data||[];

  // LIMITS: {멤버: {카테고리: 금액}}
  LIMITS = {};
  MEMBERS.forEach(m => LIMITS[m] = {});
  if(!lim.error)(lim.data||[]).forEach(l => {
    if(!LIMITS[l.member]) LIMITS[l.member] = {};
    LIMITS[l.member][l.category] = Number(l.monthly_limit);
  });

  // MASTER: {멤버: {categories, methods, accounts}}
  MASTER = {};
  MEMBERS.forEach(m => MASTER[m] = {categories:[],methods:[],accounts:[]});
  if(!mst.error)(mst.data||[]).forEach(row => {
    if(!MASTER[row.member]) MASTER[row.member] = {categories:[],methods:[],accounts:[]};
    const key = MASTER_KEY_OF[row.type] || 'accounts';
    MASTER[row.member][key].push(row.value);
  });
  MEMBERS.forEach(m => { if(!MASTER[m].categories.length) MASTER[m].categories=[...DEFAULT_CATS]; });

  // app_settings: 전역 fallback → 멤버별 override
  BILLING_STARTS={};
  let _globalBS=25;
  if(!cfg.error)(cfg.data||[]).forEach(row=>{
    if(row.key==='billing_start_day'){const v=Number(row.value);if(v>=1&&v<=28)_globalBS=v;}
    if(row.key.startsWith('billing_start_')){
      const mem=row.key.slice('billing_start_'.length);
      if(MEMBERS.includes(mem)){const v=Number(row.value);if(v>=1&&v<=28)BILLING_STARTS[mem]=v;}
    }
  });
  MEMBERS.forEach(m=>{if(!(m in BILLING_STARTS))BILLING_STARTS[m]=_globalBS;});
}

/* ── 구글 시트 백업 (단방향, fire-and-forget) ── */
function backupToSheet(action, payload){
  if(!GAS_BACKUP_URL) return;  // URL 미설정 시 비활성
  try{
    fetch(GAS_BACKUP_URL, {
      method:"POST", mode:"no-cors", keepalive:true,
      headers:{"Content-Type":"text/plain;charset=utf-8"},  // preflight 회피
      body: JSON.stringify({secret:GAS_BACKUP_SECRET, action, ...payload})
    }).catch(()=>{});  // 백업 실패는 앱 동작에 영향 없음
  }catch(e){}
}

/* ── 거래 저장/삭제 ── */
async function saveEntry(){
  const amount = Number(document.getElementById("fAmount").value.replace(/,/g,""));
  const row = {
    date:     document.getElementById("fDate").value,
    amount,
    type:     typeVal,
    member:   memberVal,
    category: document.getElementById("fCategory").value,
    method:   document.getElementById("fMethod").value,
    account:  document.getElementById("fAccount").value,
    memo:     document.getElementById("fMemo").value.trim()
  };
  if(!row.amount||!row.category||!row.account){ toast("금액·카테고리·계좌는 필수예요"); return; }
  const btn=document.getElementById("saveBtn");
  btn.textContent="저장 중..."; btn.disabled=true;
  const wasEdit=!!editId;
  try {
    let savedId=editId;
    if(wasEdit){
      const res=await sb.from("transactions").update(row).eq("id",editId);
      if(res.error){ toast("저장 오류: "+res.error.message); return; }
    } else {
      const res=await sb.from("transactions").insert(row).select("id").single();
      if(res.error){ toast("저장 오류: "+res.error.message); return; }
      savedId=res.data&&res.data.id;
    }
    backupToSheet("upsert",{id:savedId,...row});  // 구글 시트 백업
    closeSheet(); await loadAll(); render();
    toast(wasEdit?"수정 완료":"저장 완료");
  } catch(e){ toast("오류: "+e.message); }
  finally{ btn.textContent=wasEdit?"수정하기":"저장하기"; btn.disabled=false; }
}

async function delEntry(id){
  if(!confirm("삭제하시겠습니까?")) return;
  const res=await sb.from("transactions").delete().eq("id",id);
  if(res.error){ toast("삭제 오류: "+res.error.message); return; }
  backupToSheet("delete",{id});  // 구글 시트 백업
  await loadAll(); render(); toast("삭제 완료");
}

/* ── 한도 저장 (멤버별) ── */
async function saveLimit(member, cat){
  const v = Number(document.getElementById(`lim_${member}_${cat}`).value.replace(/,/g,""));
  const res = await sb.from("category_limits").upsert(
    {member, category:cat, monthly_limit:v},
    {onConflict:"member,category"}
  );
  if(res.error){ toast("한도 저장 오류: "+res.error.message); return; }
  await loadAll(); render(); toast("한도 저장");
}

/* ── 멤버 추가/삭제 (설정 탭) ── */
async function addMember(){
  const el=document.getElementById("m_input_member"), val=el.value.trim(); if(!val) return;
  const res=await sb.from("members").insert({name:val});
  if(res.error){ toast("오류: "+res.error.message); return; }
  el.value=""; await loadAll(); render();
}
async function delMember(name){
  if(!confirm(`'${name}' 멤버를 삭제하시겠습니까?\n해당 멤버의 마스터 데이터와 한도 설정이 함께 삭제됩니다.`)) return;
  const res=await sb.from("members").delete().eq("name",name);
  if(res.error){ toast("오류: "+res.error.message); return; }
  await loadAll(); render();
}

/* ── 결제 주기 저장 (멤버별) ── */
async function saveBillingStart(member){
  const raw=Number(document.getElementById(`m_billing_start_${member}`).value);
  const v=Math.max(1,Math.min(28,raw||25));
  const res=await sb.from("app_settings").upsert({key:`billing_start_${member}`,value:String(v)},{onConflict:"key"});
  if(res.error){ toast("오류: "+res.error.message); return; }
  BILLING_STARTS[member]=v;
  render();
  const ed=v>1?v-1:31;
  toast(`${member}의 주기: 매월 ${v}일 ~ 다음달 ${ed}일`);
}

/* ── 마스터 데이터 추가/삭제 ── */
async function addMaster(key){
  const el=document.getElementById("m_input_"+key), val=el.value.trim(); if(!val||!masterMember) return;
  const type=MASTER_TYPE[key];
  const res=await sb.from("master_data").upsert({member:masterMember,type,value:val},{onConflict:'member,type,value'});
  if(res.error){ toast("오류: "+res.error.message); return; }
  el.value=""; await loadAll(); render();
}
async function delMaster(key,val){
  if(!masterMember) return;
  const type=MASTER_TYPE[key];
  const res=await sb.from("master_data").delete().eq("member",masterMember).eq("type",type).eq("value",val);
  if(res.error){ toast("오류: "+res.error.message); return; }
  await loadAll(); render();
}

/* ── 네비 / 필터 ── */
function buildNav(){
  document.getElementById("nav").innerHTML = TABS.map(([k,ic,lb])=>
    `<button class="tab${k===tab?' on':''}" onclick="goTab('${k}')"><span class="tab-ic">${ic}</span>${lb}</button>`
  ).join("");
}
function goTab(k){ tab=k; buildNav(); render(); }
function setScope(s){ scope=s; render(); }
function setMemberFilter(m){ memberFilter=m; render(); }
function setLimitMember(m){ limitMember=m; render(); }
function setMasterMember(m){ masterMember=m; render(); }

/* ── 기기 기본 사용자 (localStorage) ── */
function openDeviceUser(){
  const opts=MEMBERS.map(m=>`<div class="picker-opt${DEVICE_USER===m?' on':''}" onclick="setDeviceUser('${m}')">👤 ${m}</div>`).join("");
  document.getElementById("duOpts").innerHTML=opts+`<div class="picker-opt${!DEVICE_USER?' on':''}" onclick="setDeviceUser('')">공용 (정하지 않음)</div>`;
  document.getElementById("duOv").classList.add("open");
}
function closeDeviceUser(){ document.getElementById("duOv").classList.remove("open"); }
function setDeviceUser(name){
  DEVICE_USER = name || null;
  try{ name ? localStorage.setItem(DEVICE_USER_KEY,name) : localStorage.removeItem(DEVICE_USER_KEY); }catch(e){}
  memberVal=defMember(); limitMember=defMember(); masterMember=defMember();
  memberFilter=DEVICE_USER||"전체";
  closeDeviceUser(); renderMemberSeg(); render();
  toast(DEVICE_USER?`이 기기 사용자: ${DEVICE_USER}`:"공용 모드로 변경");
}

function myRows(){ return memberFilter==="전체" ? ROWS : ROWS.filter(r=>r.member===memberFilter); }
function scoped(){
  if(scope!=="current") return myRows();
  if(memberFilter!=="전체") return myRows().filter(r=>inPeriod(r.date,billingPeriod(memberFilter)));
  return myRows().filter(r=>inPeriod(r.date,billingPeriod(r.member)));
}

/* ── 렌더 ── */
function render(){
  const m=document.getElementById("main");
  if(loadError){
    m.innerHTML=`<div class="sec"><div class="err-card">
      <div style="font-size:1.05rem;font-weight:900;color:var(--r);margin-bottom:8px">⚠️ 데이터 연결 오류</div>
      <div style="font-size:.82rem;color:var(--t2);margin-bottom:14px;line-height:1.75">${loadError}</div>
      <div style="font-size:.76rem;color:var(--t3);line-height:1.9">
        <b style="color:var(--t2)">해결 방법 (Supabase 대시보드)</b><br>
        1. Table Editor → members / transactions / category_limits / master_data → RLS Policies<br>
        2. "New Policy" → "For full customization"<br>
        3. Policy: <code style="background:var(--bg3);padding:2px 6px;border-radius:4px">FOR ALL USING (true) WITH CHECK (true)</code>
      </div>
      <button onclick="retryLoad()" style="margin-top:14px;padding:10px 20px;background:var(--acg);color:var(--ac);border:1px solid rgba(201,147,58,.25);border-radius:11px;font-weight:700;font-size:.84rem">다시 시도</button>
    </div></div>`;
    return;
  }
  if(tab==="list")     m.innerHTML = filterBar() + viewList();
  else if(tab==="cat") m.innerHTML = filterBar() + viewCategory();
  else if(tab==="limit")    m.innerHTML = viewLimit();
  else if(tab==="analysis"){ m.innerHTML = filterBar() + viewAnalysis(); drawChart(); }
  else if(tab==="acct")     m.innerHTML = viewAccount();
  else if(tab==="master")   m.innerHTML = viewMaster();
}

async function retryLoad(){
  document.getElementById("main").innerHTML='<div class="spin"></div>';
  try{ await loadAll(); }catch(e){ loadError=e.message; }
  render();
}

/* ── 필터 바 (내역·분류·분석 공통: 주기 + 멤버) ── */
// 멤버 필터 필 바 ('전체' 포함) — 내역·분류·분석·계좌 공통
function memberFilterPills(){
  return `<div class="filter">${["전체",...MEMBERS].map(mm=>`<span class="pill${memberFilter===mm?' on':''}" onclick="setMemberFilter('${mm}')">${mm}</span>`).join("")}</div>`;
}
function filterBar(){
  const _pLabel=memberFilter!=="전체"?billingPeriod(memberFilter).label:"각자 기준";
  const scopes=[["current",`이번 주기 (${_pLabel})`],["all","전체"]];
  return `<div class="filter">${scopes.map(([k,lb])=>`<span class="pill${scope===k?' on':''}" onclick="setScope('${k}')">${lb}</span>`).join("")}</div>
    ${memberFilterPills()}`;
}

/* ── 멤버 전용 바 (한도·계좌 탭: '전체' 없음) ── */
function memberBar(current, fn){
  return `<div class="filter">${MEMBERS.map(m=>`<span class="pill${current===m?' on':''}" onclick="${fn}('${m}')">${m}</span>`).join("")}</div>`;
}

/* ── 내역 탭 ── */
function viewList(){
  const rows=scoped(); if(!rows.length) return `<div class="sec">${empty("📭","내역이 없어요.\n＋ 버튼으로 추가해보세요.")}</div>`;

  const days=["일","월","화","수","목","금","토"];
  const dl=s=>{const d=new Date(s);return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;};
  let h=`<div class="sec">`;
  if(scope==="current") h+=`<div class="cards">

    <div class="card exp"><div class="c-lb">지출</div><div class="c-v r">-${won(exp)}</div></div>
  </div>`;
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{

    h+=`<div class="dgroup"><div class="dhead"><span>${dl(date)}</span><span class="dtot">${de>0?'-'+won(de):''}</span></div>`;
    dr.forEach(r=>{

      h+=`<div class="item"><div class="i-ic">${icon(r.category)}</div><div class="i-bd">
        <div class="i-top"><span class="i-cat">${r.category}</span><span class="i-amt ${cls}">${pf}${won(r.amount)}</span></div>
        <div class="chips">${r.member?`<span class="chip mem">${r.member}</span>`:""}<span class="chip">${r.account}</span>${r.method?`<span class="chip">${r.method}</span>`:""}</div>
        ${r.memo?`<div class="i-memo">${r.memo}</div>`:""}
        <div class="i-act"><button class="b-edit" onclick='editEntry(${JSON.stringify(r)})'>수정</button><button class="b-del" onclick="delEntry('${r.id}')">삭제</button></div>
      </div></div>`;
    });
    h+=`</div>`;

/* ── 분류 탭 ── */
function aggCat(rs){ const o={}; rs.forEach(r=>{(o[r.category]=o[r.category]||{inc:0,exp:0}); r.type==="입금"?o[r.category].inc+=r.amount:o[r.category].exp+=r.amount;}); return o; }
function catCard(cat,v,pct){
  const net=v.inc-v.exp;
  let st="";
  if(v.inc>0||v.exp>0){
    st=`<div class="c-st">`;
    if(v.inc>0) st+=`<div class="st"><div class="st-l">수입</div><div class="st-v g">+${won(v.inc)}</div></div>`;
    if(v.exp>0) st+=`<div class="st"><div class="st-l">지출</div><div class="st-v r">-${won(v.exp)}</div></div>`;
    st+=`</div>`;
  }
  return `<div class="ccard"><div class="c-h"><div class="c-l"><div class="c-ic">${icon(cat)}</div><div class="c-nm">${cat}</div></div><span class="c-bd ${net>=0?'bg':'br'}">${net>=0?'+':''}${won(net)}</span></div>${st}${pct>0?`<div class="barw"><div class="bar" style="width:${pct}%"></div></div>`:""}</div>`;
}
function viewCategory(){
  const rows=scoped(), sum=aggCat(rows);
  if(!Object.keys(sum).length) return `<div class="sec">${empty("📭","데이터가 없습니다")}</div>`;
  const totExp=Object.values(sum).reduce((s,v)=>s+v.exp,0);
  let h=`<div class="sec">`;
  Object.entries(sum).sort((a,b)=>b[1].exp-a[1].exp).forEach(([c,v])=>h+=catCard(c,v,totExp?Math.round(v.exp/totExp*100):0));
  if(scope==="all"){
    const _catMem=memberFilter!=="전체"?memberFilter:MEMBERS[0];
    [...recentPeriods(3,_catMem)].reverse().forEach(p=>{
      const ma=aggCat(myRows().filter(r=>inPeriod(r.date,p)));
      if(!Object.keys(ma).length) return;
      h+=`<div class="sec-t">📅 ${p.label}</div>`;
      Object.entries(ma).sort((a,b)=>b[1].exp-a[1].exp).forEach(([c,v])=>h+=catCard(c,v,0));
    });
  }
  return h+`</div>`;
}

/* ── 한도 탭 (멤버별) ── */
function viewLimit(){
  if(!limitMember) return `<div class="sec">${empty("👥","설정에서 멤버를 추가해주세요.")}</div>`;
  const cur=billingPeriod(limitMember);
  const memberLimits=LIMITS[limitMember]||{};
  const spent={};
  ROWS.filter(r=>r.member===limitMember&&r.type==="지출"&&inPeriod(r.date,cur))
      .forEach(r=>spent[r.category]=(spent[r.category]||0)+r.amount);

  const cats=Array.from(new Set([...Object.keys(memberLimits),...Object.keys(spent)]));
  const items=cats.map(cat=>{
    const limit=memberLimits[cat]||0, used=spent[cat]||0;
    return {cat,limit,used,pct:limit?Math.round(used/limit*100):0};
  }).sort((a,b)=>b.pct-a.pct);
  const over=items.filter(i=>i.limit&&i.pct>=100);

  let h=memberBar(limitMember,"setLimitMember")+`<div class="sec">`;
  h+=`<div class="sec-t" style="padding-top:4px">${limitMember}의 이번 주기 한도 · ${cur.label}</div>`;
  if(over.length) h+=`<div class="alert">⚠️ <b>${over.map(o=>o.cat).join(", ")}</b> 한도 초과!</div>`;

  if(!items.length){
    h+=empty("🎯","지출 내역이나 설정된 한도가 없어요.\n아래에서 한도를 직접 추가할 수 있어요.");
  } else {
    items.forEach(it=>{
      const state=!it.limit?"ok":it.pct>=100?"over":it.pct>=80?"warn":"ok";
      h+=`<div class="lcard ${state}">
        <div class="l-h"><div class="c-l"><div class="c-ic">${icon(it.cat)}</div><div class="c-nm">${it.cat}</div></div><div class="l-pct ${state}">${it.limit?it.pct+'%':'한도없음'}</div></div>`;
      if(it.limit){
        h+=`<div class="l-bar-w"><div class="l-bar ${state}" style="width:${Math.min(it.pct,100)}%"></div></div>
          <div class="l-meta"><span>${won(it.used)}</span><span class="l-lim">/ ${won(it.limit)}</span></div>`;
        if(state==="over") h+=`<div class="l-msg">${won(it.used-it.limit)} 초과</div>`;
        else if(state==="warn") h+=`<div class="l-msg warn">한도까지 ${won(it.limit-it.used)}</div>`;
      } else {
        h+=`<div class="l-meta"><span>이번 주기 ${won(it.used)} 사용</span></div>`;
      }
      h+=`<div class="l-edit"><input id="lim_${limitMember}_${it.cat}" inputmode="numeric" placeholder="월 한도" value="${it.limit||''}"><button onclick="saveLimit('${limitMember}','${it.cat}')">저장</button></div>
      </div>`;
    });
  }
  return h+`</div>`;
}

/* ── 분석 탭 ── */
let chartData=[];
function viewAnalysis(){
  const _anMem=memberFilter!=="전체"?memberFilter:MEMBERS[0];
  const periods=recentPeriods(3,_anMem);
  chartData=periods.map(p=>{
    const pr=myRows().filter(r=>inPeriod(r.date,p));
    return {name:p.label.split(" ")[0], inc:pr.filter(r=>r.type==="입금").reduce((s,r)=>s+r.amount,0), exp:pr.filter(r=>r.type!=="입금").reduce((s,r)=>s+r.amount,0)};
  });
  const byMemo={};
  myRows().filter(r=>r.type==="지출"&&r.memo).forEach(r=>{
    const pi=periods.findIndex(p=>inPeriod(r.date,p)); if(pi<0) return;
    const k=r.category+"::"+r.memo.replace(/\(.*\)/,"").trim();
    (byMemo[k]=byMemo[k]||{cat:r.category,memo:r.memo,total:0,ps:new Set()});
    byMemo[k].total+=r.amount; byMemo[k].ps.add(pi);
  });
  const list=Object.values(byMemo).map(x=>({...x,span:x.ps.size}));
  const rec=list.filter(x=>x.span>=2).sort((a,b)=>b.total-a.total);
  const one=list.filter(x=>x.span===1&&x.total>=100000).sort((a,b)=>b.total-a.total);
  const avg=Math.round(chartData.reduce((s,d)=>s+d.exp,0)/(chartData.length||1));
  const last=chartData[chartData.length-1]?.exp||0, prev=chartData[chartData.length-2]?.exp||0;
  const tr=prev?Math.round((last-prev)/prev*100):0;
  return `<div class="sec">
    <div class="panel"><div class="p-t">📈 주기별 수입·지출</div><canvas id="chart" height="180"></canvas></div>
    <div class="panel"><div class="p-t">🧾 분석 요약</div><div class="p-body">최근 ${chartData.length}개 주기 평균 지출은 ${won(avg)}입니다.
이번 주기 지출은 전 주기 대비 ${tr>=0?'+':''}${tr}% (${won(last)}).
${rec.length?`반복 지출 ${rec.length}건이 매 주기 빠져나가고 있어요.`:"뚜렷한 반복 지출은 아직 없습니다."}</div></div>
    <div class="panel"><div class="p-t">🔁 반복 지출</div>${rec.length?rec.map(x=>`<div class="arow"><span class="a-mo">${icon(x.cat)} ${x.memo}</span><span class="a-tag rec">${x.span}주기</span><span class="a-v">${won(x.total)}</span></div>`).join(''):'<div class="p-body">없음</div>'}</div>
    <div class="panel"><div class="p-t">💥 일회성 큰 지출</div>${one.length?one.map(x=>`<div class="arow"><span class="a-mo">${icon(x.cat)} ${x.memo}</span><span class="a-tag one">1회</span><span class="a-v">${won(x.total)}</span></div>`).join(''):'<div class="p-body">없음</div>'}</div>
  </div>`;
}
let chartInst=null;
function drawChart(){
  const ctx=document.getElementById("chart"); if(!ctx) return;
  if(chartInst) chartInst.destroy();
  chartInst=new Chart(ctx,{type:"bar",data:{labels:chartData.map(d=>d.name),datasets:[
    {label:"수입",data:chartData.map(d=>d.inc),backgroundColor:"rgba(46,200,144,.75)",borderRadius:6},
    {label:"지출",data:chartData.map(d=>d.exp),backgroundColor:"rgba(240,84,112,.75)",borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{labels:{color:"#6E6C8A",font:{size:11},boxWidth:10}}},
      scales:{x:{ticks:{color:"#6E6C8A",font:{size:11}},grid:{display:false}},y:{ticks:{color:"#32304E",font:{size:10},callback:v=>wonShort(v)},grid:{color:"#12141F"}}}}});
}

/* ── 계좌 탭 (멤버 필터 적용) ── */
function viewAccount(){
  const rows = memberFilter==="전체" ? ROWS : ROWS.filter(r=>r.member===memberFilter);
  let inc=0, exp=0, acct={};
  rows.forEach(r=>{
    const a=r.account||"미분류";
    if(r.type==="입금"){ inc+=r.amount; acct[a]=(acct[a]||0)+r.amount; }
    else{ exp+=r.amount; acct[a]=(acct[a]||0)-r.amount; }
  });
  let h=`${memberFilterPills()}<div class="sec">
    <div class="acct-tot"><div class="at-l">${memberFilter==="전체"?"전체 합산 잔액":memberFilter+"의 잔액"}</div><div class="at-v">${won(inc-exp)}</div></div>
    <div class="acct-grid">
      <div class="am"><div class="am-l">총 수입</div><div class="am-v g">+${won(inc)}</div></div>
      <div class="am"><div class="am-l">총 지출</div><div class="am-v r">-${won(exp)}</div></div>
    </div>
    <div class="sec-t">계좌별 잔액</div>`;
  if(Object.keys(acct).length){
    Object.entries(acct).forEach(([nm,b])=>h+=`<div class="acard"><div><div class="a-nm">🏦 ${nm}</div><div class="a-sub">잔액</div></div><div class="a-bal ${b>=0?'g':'r'}">${b>=0?'+':''}${won(b)}</div></div>`);
  } else {
    h+=empty("🏦","계좌 데이터가 없어요.");
  }
  return h+`</div>`;
}

/* ── 입력 시트 ── */
function refreshCatList(){
  const mdata=MASTER[memberVal]||{categories:[...DEFAULT_CATS],methods:[],accounts:[]};
  const memberLimits=LIMITS[memberVal]||{};
  const cats=Array.from(new Set([...mdata.categories,...Object.keys(memberLimits)]));

function renderMemberSeg(){
  document.getElementById("memberSeg").innerHTML=MEMBERS.map(m=>`<button class="${m===memberVal?'on':''}" onclick="setMember('${m}')">${m}</button>`).join("");
}
function setMember(m){ memberVal=m; renderMemberSeg(); refreshCatList(); }
function setType(t){

  document.getElementById("tgInc").className="tg"+(t==="입금"?" tg-i":"");

function openSheet(){
  if(!MEMBERS.length){ toast("설정에서 멤버를 먼저 추가해주세요"); return; }
  editId=null;

document.getElementById("fAmount").addEventListener("input",e=>{

/* ── 커스텀 피커 ── */
let pickerSel = null;
function openPicker(selId, title){
  pickerSel = selId;
  const sel = document.getElementById(selId);
  const opts = Array.from(sel.options);
  document.getElementById("pickerTitle").textContent = title;
  if(!opts.length){
    document.getElementById("pickerOpts").innerHTML = '<div style="padding:24px 20px;text-align:center;color:var(--t3);font-size:.85rem">항목이 없어요. 설정에서 추가해주세요.</div>';
  } else {
    document.getElementById("pickerOpts").innerHTML = opts.map((o,i)=>
      `<div class="picker-opt${sel.value===o.value?' on':''}" onclick="pickOptIdx(${i})">${o.text}</div>`
    ).join("");
  }
  document.getElementById("pickerOv").classList.add("open");
}
function pickOptIdx(idx){
  if(!pickerSel) return;
  const sel = document.getElementById(pickerSel);
  sel.selectedIndex = idx;
  updateSelBtn(pickerSel);
  closePicker();
}
function closePicker(){
  document.getElementById("pickerOv").classList.remove("open");
  pickerSel = null;
}
function updateSelBtn(selId){
  const sel = document.getElementById(selId);
  const disp = document.getElementById(selId+"Disp");
  if(!sel||!disp) return;
  const opt = sel.options[sel.selectedIndex];
  disp.textContent = opt ? opt.text : "선택";
}
</script>
</body>
</html>
